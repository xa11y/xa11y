    # ── Wait / event-loop idiom differences ───────────────────────────────
    { method = "Locator::with_timeout", reason = "Rust-only builder for a per-locator timeout override; JS uses per-call timeout options on every wait* method plus the process-wide setDefaultTimeout() instead." },
    { method = "Locator::wait_for_state", reason = "Rust generic state-enum wait; JS exposes specific wait* helpers plus predicate-based waitUntil." },
    { method = "Subscription::recv_status", reason = "Rust explicit disconnected-vs-timeout polling variant; JS uses predicate-based waitFor and EventEmitter model over blocking recv." },
    { method = "Subscription::try_recv", reason = "JS exposes async EventEmitter + `start`/`drain` worker pattern instead of blocking recv/try_recv." },
    { method = "Subscription::recv", reason = "JS exposes async EventEmitter + `start`/`drain` worker pattern instead of blocking recv/try_recv." },
    { method = "Subscription::iter", reason = "JS exposes async EventEmitter + `start`/`drain` worker pattern instead of a blocking iterator." },
]
# JS-only methods not in Rust core. `constructor` is filtered automatically.
js_only = [
    # App convenience constructors mirror the Rust `xa11y::AppExt::by_name`
    # etc. but live as static methods on the napi-generated App class.
    { method = "App::by_name", reason = "Binding-level convenience over App::by_name_with using the singleton provider; mirrors `xa11y::AppExt::by_name`." },
    { method = "App::by_pid", reason = "Binding-level convenience over App::by_pid_with using the singleton provider; mirrors `xa11y::AppExt::by_pid`." },
    { method = "App::foreground", reason = "Binding-level convenience over App::foreground_with using the singleton provider; mirrors `xa11y::AppExt::foreground`." },
    { method = "App::list", reason = "Binding-level convenience over App::list_with using the singleton provider; mirrors `xa11y::AppExt::list`." },
    { method = "App::find", reason = "Binding-level convenience over App::try_find_with/find_with using the singleton provider; mirrors `xa11y::AppExt::find`. Implemented as a JS-side poll loop over App.list() in index.js, declared in index.d.ts." },

    # App.waitForEvent is a JS-only convenience that wraps subscribe() + a
    # one-shot waitForEvent() on the returned Subscription.
    { method = "App::wait_for_event", reason = "JS-only convenience: temporary subscription + single-event wait, declared in index.d.ts." },

    # Flattened StateSet: JS exposes each boolean state directly on Element
    # (element.enabled, element.visible, ...) instead of a nested states
    # object. Core keeps these grouped under ElementData.states.
    { method = "Element::enabled", reason = "Flattened from ElementData.states.enabled for JS ergonomics." },
    { method = "Element::visible", reason = "Flattened from ElementData.states.visible for JS ergonomics." },
    { method = "Element::focused", reason = "Flattened from ElementData.states.focused for JS ergonomics." },
    { method = "Element::checked", reason = "Flattened from ElementData.states.checked for JS ergonomics." },
    { method = "Element::selected", reason = "Flattened from ElementData.states.selected for JS ergonomics." },
    { method = "Element::expanded", reason = "Flattened from ElementData.states.expanded for JS ergonomics." },
    { method = "Element::editable", reason = "Flattened from ElementData.states.editable for JS ergonomics." },
    { method = "Element::focusable", reason = "Flattened from ElementData.states.focusable for JS ergonomics." },
    { method = "Element::modal", reason = "Flattened from ElementData.states.modal for JS ergonomics." },
    { method = "Element::required", reason = "Flattened from ElementData.states.required for JS ergonomics." },
    { method = "Element::busy", reason = "Flattened from ElementData.states.busy for JS ergonomics." },

    # Element.subscribe is a binding convenience — core requires going through
    # App.subscribe(), but the bindings let users subscribe to any element.
    { method = "Element::subscribe", reason = "Binding convenience: subscribe to events for any element, delegating to the underlying provider.subscribe()." },

    # _NativeSubscription worker-pattern helpers. These are internal plumbing
    # for the EventEmitter-based Subscription wrapper in index.js.
    { method = "Subscription::start", reason = "JS threadsafe-function worker pattern for async event delivery; not user API." },
    { method = "Subscription::drain", reason = "JS threadsafe-function worker pattern for async event delivery; not user API." },
    { method = "Subscription::close", reason = "JS idiom for explicit subscription teardown, exposed on both _NativeSubscription (napi) and the user-facing EventEmitter wrapper." },
    { method = "Subscription::closed", reason = "JS readonly property on the EventEmitter-based Subscription wrapper." },
    { method = "Subscription::wait_for_event", reason = "JS-only EventEmitter convenience, declared in index.d.ts." },
]
