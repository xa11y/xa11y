# cargo-deny configuration
# https://embarkstudios.github.io/cargo-deny/
#
# Run locally: cargo deny check licenses

[licenses]
# Reject copyleft licenses — only allow permissive ones.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unlicense",
    "Zlib",
    "Unicode-3.0",
]
confidence-threshold = 0.8

# Internal crates without a license field (e.g. xa11y-fuzz)
[[licenses.clarify]]
name = "xa11y-fuzz"
expression = "MIT"
license-files = []
