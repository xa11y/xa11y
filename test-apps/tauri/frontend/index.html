<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>xa11y-tauri-test-app</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 16px; }
    fieldset { margin-bottom: 16px; padding: 12px; }
    legend { font-weight: bold; }
    .row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; margin-bottom: 8px; }
    label { display: flex; align-items: center; gap: 6px; }
    input[type="range"] { width: 200px; }
    textarea { width: 300px; height: 60px; }
    select { width: 160px; }
    ul[role="listbox"] { list-style: none; padding: 0; margin: 0; border: 1px solid #ccc; width: 200px; }
    ul[role="listbox"] li { padding: 4px 8px; cursor: default; }
    ul[role="listbox"] li[aria-selected="true"] { background: #0078d7; color: white; }
  </style>
</head>
<body>

  <p>
    <button id="input-events-nav"
            aria-label="Open input events page"
            onclick="window.location.href='input-events.html'">
      input events
    </button>
  </p>

  <!-- Buttons -->
  <fieldset>
    <legend>Buttons</legend>
    <div class="row">
      <button id="ok-button" aria-label="OK" title="Confirm the dialog">OK</button>
      <button id="cancel-button" aria-label="Cancel" disabled>Cancel</button>
    </div>
  </fieldset>

  <!-- Checkboxes -->
  <fieldset>
    <legend>Checkboxes</legend>
    <div class="row">
      <label>
        <input type="checkbox" id="agree-check" aria-label="Agree to terms" />
        Agree to terms
      </label>
      <label>
        <input type="checkbox" id="subscribe-check" aria-label="Subscribe" checked />
        Subscribe
      </label>
    </div>
  </fieldset>

  <!-- Radio buttons -->
  <fieldset>
    <legend>Options</legend>
    <div class="row">
      <label>
        <input type="radio" name="options" id="radio-a" aria-label="Option A" checked />
        Option A
      </label>
      <label>
        <input type="radio" name="options" id="radio-b" aria-label="Option B" />
        Option B
      </label>
      <label>
        <input type="radio" name="options" id="radio-c" aria-label="Option C" />
        Option C
      </label>
    </div>
  </fieldset>

  <!-- ComboBox -->
  <fieldset>
    <legend>ComboBox</legend>
    <div class="row">
      <label for="fruit-select">Fruit</label>
      <select id="fruit-select" aria-label="Fruit">
        <option value="apple">Apple</option>
        <option value="banana">Banana</option>
        <option value="cherry">Cherry</option>
        <option value="date">Date</option>
        <option value="elderberry">Elderberry</option>
      </select>
    </div>
  </fieldset>

  <!-- Range controls -->
  <fieldset>
    <legend>Range Controls</legend>
    <div class="row">
      <label for="volume-slider">Volume</label>
      <input
        type="range"
        id="volume-slider"
        aria-label="Volume"
        min="0" max="100" value="50"
        aria-valuemin="0" aria-valuemax="100" aria-valuenow="50"
      />
      <output id="volume-output" for="volume-slider">50</output>
    </div>
    <div class="row">
      <label for="quantity-spin">Quantity</label>
      <input
        type="number"
        id="quantity-spin"
        aria-label="Quantity"
        role="spinbutton"
        min="0" max="999" value="42"
        aria-valuemin="0" aria-valuemax="999" aria-valuenow="42"
      />
    </div>
    <div class="row">
      <label>Progress</label>
      <progress id="progress-bar" aria-label="Progress" value="75" max="100">75%</progress>
    </div>
  </fieldset>

  <!-- Text input -->
  <fieldset>
    <legend>Input</legend>
    <div class="row">
      <label for="search-field">Search</label>
      <input
        type="text"
        id="search-field"
        aria-label="Search"
        placeholder="Type here..."
        value="hello world"
      />
    </div>
  </fieldset>

  <!-- Text area -->
  <fieldset>
    <legend>Text</legend>
    <div class="row">
      <p id="heading-text" aria-label="Heading Text"><strong>Heading Text</strong></p>
    </div>
    <div class="row">
      <label for="notes-area">Notes</label>
      <textarea id="notes-area" aria-label="Notes">Line 1
Line 2
Line 3</textarea>
    </div>
  </fieldset>

  <!-- List -->
  <fieldset>
    <legend>List</legend>
    <ul role="listbox" id="items-list" aria-label="Items">
      <li role="option" aria-selected="false">Item 1</li>
      <li role="option" aria-selected="false">Item 2</li>
      <li role="option" aria-selected="false">Item 3</li>
      <li role="option" aria-selected="false">Item 4</li>
      <li role="option" aria-selected="false">Item 5</li>
    </ul>
  </fieldset>

  <!-- Table: WebKit exposes <table> as AT-SPI "table" (AXTable on macOS)
       with "table cell" (AXCell) children, matching the cross-platform
       table/table_cell contract.

       Deliberately NO <th> header cells: under WebKitGTK 2.52 with a
       window manager present (the CI setup), a table containing <th>
       sends the web process's accessibility tree into a continuous
       invalidation churn — every content accessible goes defunct
       moments after being exposed, which takes the whole page out of
       the AT-SPI tree and fails every suite test. Verified by bisecting
       this file against a live harness run; <td>-only tables are
       stable. The Electron page keeps its <th> row (Chromium is
       unaffected), so header coverage for webviews lives there.

       The <caption> is load-bearing: without headers, WebKit's layout-
       table heuristic judges the table decorative and drops it from the
       accessibility tree entirely; a caption marks it as a data table
       (and names it on macOS). -->
  <fieldset>
    <legend>Table</legend>
    <table id="users-table" aria-label="Users Table">
      <caption>Users Table</caption>
      <tbody>
        <tr><td>Alice</td><td>Admin</td></tr>
        <tr><td>Bob</td><td>User</td></tr>
      </tbody>
    </table>
  </fieldset>

  <!--
    Dynamic widgets used by the event test suite. These mutate on click so
    NameChanged (Submit → status label) and StructureChanged (Add/Remove Item
    → list rows) can be exercised end-to-end.
  -->
  <fieldset>
    <legend>Dynamic</legend>
    <div class="row">
      <p id="status-label" aria-label="Status: Ready">Status: Ready</p>
    </div>
    <div class="row">
      <button id="submit-button" aria-label="Submit">Submit</button>
      <button id="add-item-button" aria-label="Add Item">Add Item</button>
      <button id="remove-item-button" aria-label="Remove Item">Remove Item</button>
    </div>
  </fieldset>

  <script>
    // OK button enables Cancel
    document.getElementById('ok-button').addEventListener('click', () => {
      document.getElementById('cancel-button').disabled = false;
    });

    // Slider syncs aria-valuenow and output
    const slider = document.getElementById('volume-slider');
    const output = document.getElementById('volume-output');
    slider.addEventListener('input', () => {
      slider.setAttribute('aria-valuenow', slider.value);
      output.textContent = slider.value;
    });

    // Spin syncs aria-valuenow
    const spin = document.getElementById('quantity-spin');
    spin.addEventListener('input', () => {
      spin.setAttribute('aria-valuenow', spin.value);
    });

    // Submit toggles the status label text (drives NameChanged)
    const statusLabel = document.getElementById('status-label');
    document.getElementById('submit-button').addEventListener('click', () => {
      const current = statusLabel.textContent;
      const next = current === 'Status: Submitted' ? 'Status: Ready' : 'Status: Submitted';
      statusLabel.textContent = next;
      statusLabel.setAttribute('aria-label', next);
    });

    // Add/Remove Item mutate the list (drive StructureChanged)
    const itemsList = document.getElementById('items-list');
    let nextItemIx = 6;
    document.getElementById('add-item-button').addEventListener('click', () => {
      const li = document.createElement('li');
      li.setAttribute('role', 'option');
      li.setAttribute('aria-selected', 'false');
      li.textContent = `Item ${nextItemIx}`;
      itemsList.appendChild(li);
      nextItemIx += 1;
    });
    document.getElementById('remove-item-button').addEventListener('click', () => {
      const last = itemsList.lastElementChild;
      if (last) itemsList.removeChild(last);
    });
  </script>
</body>
</html>
