<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 320" width="720" height="320">
  <defs>
    <style>
      .bg { fill: #1a1a2e; }
      .box { fill: #23234a; stroke: #444c7a; stroke-width: 1.5; rx: 8; }
      .box-accent { fill: #2a2a5a; stroke: #7c6ef0; stroke-width: 1.5; rx: 8; }
      .label { fill: #e0e0e0; font-family: system-ui, -apple-system, sans-serif; font-size: 13px; text-anchor: middle; }
      .label-bold { fill: #ffffff; font-family: system-ui, -apple-system, sans-serif; font-size: 13px; font-weight: 600; text-anchor: middle; }
      .label-sm { fill: #9090b0; font-family: system-ui, -apple-system, sans-serif; font-size: 11px; text-anchor: middle; }
      .arrow { stroke: #666690; stroke-width: 1.5; fill: none; marker-end: url(#head); }
      .arrow-accent { stroke: #7c6ef0; stroke-width: 1.5; fill: none; marker-end: url(#head-accent); }
      .divider { stroke: #333360; stroke-width: 1; stroke-dasharray: 4 4; }
      .lane-label { fill: #707090; font-family: system-ui, -apple-system, sans-serif; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }

      @media (prefers-color-scheme: light) {
        .bg { fill: #f8f8fc; }
        .box { fill: #ffffff; stroke: #c0c0d0; }
        .box-accent { fill: #f0eeff; stroke: #7c6ef0; }
        .label { fill: #333344; }
        .label-bold { fill: #111122; }
        .label-sm { fill: #666680; }
        .arrow { stroke: #9999b0; marker-end: url(#head-light); }
        .arrow-accent { stroke: #7c6ef0; marker-end: url(#head-accent); }
        .divider { stroke: #d0d0e0; }
        .lane-label { fill: #888899; }
      }
    </style>
    <marker id="head" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#666690" stroke-width="1.2" />
    </marker>
    <marker id="head-light" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#9999b0" stroke-width="1.2" />
    </marker>
    <marker id="head-accent" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#7c6ef0" stroke-width="1.2" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="720" height="320" class="bg" rx="12" />

  <!-- Lane labels -->
  <text x="24" y="80" class="lane-label">Read</text>
  <text x="24" y="215" class="lane-label">Act</text>
  <text x="24" y="295" class="lane-label">Listen</text>

  <!-- Dividers -->
  <line x1="20" y1="145" x2="700" y2="145" class="divider" />
  <line x1="20" y1="255" x2="700" y2="255" class="divider" />

  <!-- === READ LANE === -->

  <!-- App -->
  <rect x="70" y="42" width="100" height="50" class="box-accent" />
  <text x="120" y="62" class="label-bold">App</text>
  <text x="120" y="78" class="label-sm">from_name / pid</text>

  <!-- .nodes() -->
  <rect x="210" y="42" width="90" height="44" class="box-accent" />
  <text x="255" y="69" class="label-bold">.nodes()</text>

  <!-- Node (snapshot root) -->
  <rect x="340" y="42" width="120" height="44" class="box" />
  <text x="400" y="60" class="label-bold">Node</text>
  <text x="400" y="76" class="label-sm">frozen snapshot</text>

  <!-- children() / parent() -->
  <rect x="500" y="42" width="180" height="44" class="box" />
  <text x="590" y="60" class="label-bold">.children() / .parent()</text>
  <text x="590" y="76" class="label-sm">navigate snapshot</text>

  <!-- Read arrows -->
  <line x1="170" y1="64" x2="208" y2="64" class="arrow" />
  <line x1="300" y1="64" x2="338" y2="64" class="arrow" />
  <line x1="460" y1="64" x2="498" y2="64" class="arrow" />

  <!-- children()/parent() loops back to Node -->
  <path d="M 590,86 L 590,110 Q 590,120 580,120 L 410,120 Q 400,120 400,110 L 400,88" class="arrow" />


  <!-- === ACT LANE === -->

  <!-- App -->
  <rect x="70" y="175" width="100" height="44" class="box-accent" />
  <text x="120" y="202" class="label-bold">App</text>

  <!-- .locator() -->
  <rect x="210" y="175" width="100" height="44" class="box-accent" />
  <text x="260" y="193" class="label-bold">.locator()</text>
  <text x="260" y="209" class="label-sm">+ selector</text>

  <!-- Locator -->
  <rect x="345" y="175" width="100" height="44" class="box" />
  <text x="395" y="193" class="label-bold">Locator</text>
  <text x="395" y="209" class="label-sm">auto-refetches</text>

  <!-- Actions -->
  <rect x="490" y="168" width="100" height="26" class="box-accent" />
  <text x="540" y="186" class="label-bold">Actions</text>

  <!-- Waits -->
  <rect x="490" y="200" width="100" height="26" class="box-accent" />
  <text x="540" y="218" class="label-bold">Waits</text>

  <!-- .node() / .nodes() -->
  <rect x="620" y="175" width="75" height="44" class="box" />
  <text x="657" y="193" class="label-bold">.node()</text>
  <text x="657" y="209" class="label-sm">.nodes()</text>

  <!-- Act arrows -->
  <line x1="170" y1="197" x2="208" y2="197" class="arrow-accent" />
  <line x1="310" y1="197" x2="343" y2="197" class="arrow-accent" />
  <line x1="445" y1="187" x2="488" y2="181" class="arrow-accent" />
  <line x1="445" y1="207" x2="488" y2="213" class="arrow-accent" />
  <line x1="445" y1="197" x2="618" y2="197" class="arrow" />

  <!-- === EVENTS LANE === -->

  <!-- App -->
  <rect x="70" y="272" width="100" height="34" class="box-accent" />
  <text x="120" y="294" class="label-bold">App</text>

  <!-- subscribe() -->
  <rect x="210" y="272" width="100" height="34" class="box-accent" />
  <text x="260" y="290" class="label-bold">subscribe()</text>

  <!-- Event Stream -->
  <rect x="345" y="272" width="120" height="34" class="box" />
  <text x="405" y="290" class="label-bold">Event Stream</text>

  <!-- Coming soon -->
  <text x="525" y="294" class="label-sm">(coming soon)</text>

  <!-- Event arrows -->
  <line x1="170" y1="289" x2="208" y2="289" class="arrow" />
  <line x1="310" y1="289" x2="343" y2="289" class="arrow" />
</svg>
