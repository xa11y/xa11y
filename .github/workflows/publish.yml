name: Publish

on:
  workflow_dispatch:
    inputs:
      level:
        description: "Version bump level"
        required: true
        type: choice
        options:
          - release  # publish current version without bumping
          - patch
          - minor
          - major

env:
  CARGO_TERM_COLOR: always

jobs:
  version-bump:
    name: Bump version
    if: inputs.level != 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-node@v7
        with:
          node-version: 22

      - name: Install cargo-release
        run: cargo install cargo-release

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        run: cargo release ${{ inputs.level }} --execute --no-confirm

      - name: Sync Python package version
        run: |
          VERSION=$(sed -n '/\[workspace\.package\]/,/\[/{s/^version = "\(.*\)"/\1/p}' Cargo.toml)
          sed -i "s/^version = \".*\"/version = \"$VERSION\"/" xa11y-python/Cargo.toml
          git add xa11y-python/Cargo.toml
          git commit -m "chore: sync xa11y-python version to $VERSION"
          git push

      # xa11y-js is excluded from the Cargo workspace, so cargo-release doesn't
      # touch its Cargo.toml / package.json. Sync them manually here.
      - name: Sync JS bindings version
        run: |
          VERSION=$(sed -n '/\[workspace\.package\]/,/\[/{s/^version = "\(.*\)"/\1/p}' Cargo.toml)
          sed -i "s/^version = \".*\"/version = \"$VERSION\"/" xa11y-js/Cargo.toml
          (cd xa11y-js && npm version "$VERSION" --no-git-tag-version --allow-same-version)
          git add xa11y-js/Cargo.toml xa11y-js/package.json xa11y-js/package-lock.json
          git commit -m "chore: sync xa11y-js version to $VERSION"
          git push

  publish-crates:
    name: Publish to crates.io
    needs: [version-bump]
    if: always() && (needs.version-bump.result == 'success' || needs.version-bump.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: main

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      # `cargo publish` runs a verification build of each crate. xa11y-linux
      # links libxkbcommon for the Wayland input backend, so the dev headers
      # must be present on the runner.
      - name: Install Linux system dependencies
        run: sudo apt-get update && sudo apt-get install -y libxkbcommon-dev

      # Publish crates in dependency order. On re-release (level=release),
      # versions may already exist on crates.io — skip those gracefully.
      - name: Publish all crates
        run: |
          publish_or_skip() {
            local output
            if output=$(cargo publish -p "$1" 2>&1); then
              echo "✓ $1 published"
            elif echo "$output" | grep -qE "already (uploaded|exists)"; then
              echo "⊘ $1 already on crates.io, skipping"
            else
              echo "$output" >&2
              return 1
            fi
          }
          publish_or_skip xa11y-core
          sleep 30
          publish_or_skip xa11y-macos
          publish_or_skip xa11y-windows
          publish_or_skip xa11y-linux
          sleep 30
          publish_or_skip xa11y
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  # ── Python wheels ──────────────────────────────────────────────────────

  build-wheels-linux:
    name: Build wheels (Linux)
    needs: [version-bump]
    if: always() && (needs.version-bump.result == 'success' || needs.version-bump.result == 'skipped')
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v7
        with:
          ref: main

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      # aarch64 wheels run inside a native aarch64 manylinux container
      # under QEMU emulation. The default cross-compile container has an
      # x86_64 host with aarch64 cross-gcc but no arm64 sysroot, so
      # `yum install libxkbcommon-devel` would only land x86_64 libs.
      # Emulating the full aarch64 toolchain costs build minutes but
      # keeps the package install trivially native to the target arch.
      - if: matrix.target == 'aarch64'
        uses: docker/setup-qemu-action@v4
        with:
          platforms: arm64

      - uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist
          manylinux: auto
          container: ${{ matrix.target == 'aarch64' && 'quay.io/pypa/manylinux2014_aarch64' || '' }}
          docker-options: ${{ matrix.target == 'aarch64' && '--platform=linux/arm64' || '' }}
          working-directory: xa11y-python
          before-script-linux: |
            # Install dev headers for transitive system deps:
            #   - dbus     (zbus, AT-SPI2 transport)
            #   - xkbcommon (Wayland input backend keysym lookup)
            if command -v yum &> /dev/null; then
              yum install -y dbus-devel libxkbcommon-devel
            elif command -v apt-get &> /dev/null; then
              apt-get update && apt-get install -y libdbus-1-dev libxkbcommon-dev
            fi

      - uses: actions/upload-artifact@v7
        with:
          name: wheels-linux-${{ matrix.target }}
          path: xa11y-python/dist

  build-wheels-macos:
    name: Build wheels (macOS)
    needs: [version-bump]
    if: always() && (needs.version-bump.result == 'success' || needs.version-bump.result == 'skipped')
    runs-on: macos-latest
    strategy:
      matrix:
        target: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v7
        with:
          ref: main

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist
          working-directory: xa11y-python

      - uses: actions/upload-artifact@v7
        with:
          name: wheels-macos-${{ matrix.target }}
          path: xa11y-python/dist

  build-wheels-windows:
    name: Build wheels (Windows)
    needs: [version-bump]
    if: always() && (needs.version-bump.result == 'success' || needs.version-bump.result == 'skipped')
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: main

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: PyO3/maturin-action@v1
        with:
          target: x86_64
          args: --release --out dist
          working-directory: xa11y-python

      - uses: actions/upload-artifact@v7
        with:
          name: wheels-windows-x86_64
          path: xa11y-python/dist

  build-sdist:
    name: Build sdist
    needs: [version-bump]
    if: always() && (needs.version-bump.result == 'success' || needs.version-bump.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: main

      - uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
          working-directory: xa11y-python

      - uses: actions/upload-artifact@v7
        with:
          name: wheels-sdist
          path: xa11y-python/dist

  publish-pypi:
    name: Publish to PyPI
    needs: [build-wheels-linux, build-wheels-macos, build-wheels-windows, build-sdist]
    # Explicit if: needed because version-bump (transitive ancestor) may be
    # skipped on level=release, which causes GitHub Actions to skip all
    # descendants unless they opt in.
    if: always() && !contains(needs.*.result, 'failure') && !contains(needs.*.result, 'cancelled')
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist

      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          skip-existing: true

  # ── npm (JavaScript bindings) ──────────────────────────────────────
  #
  # napi-rs publishes one package per target triple (e.g.
  # @crowecawcaw/xa11y-linux-x64-gnu) containing only the prebuilt
  # `.node` binary, plus the umbrella `@crowecawcaw/xa11y` package that
  # references them via `optionalDependencies` and dispatches at load
  # time. We build the six supported triples in a fan-out matrix, upload
  # each `.node` as an artifact, then fan back in for a single publish
  # job.

  build-npm:
    name: Build npm (${{ matrix.settings.target }})
    needs: [version-bump]
    if: always() && (needs.version-bump.result == 'success' || needs.version-bump.result == 'skipped')
    strategy:
      fail-fast: false
      matrix:
        settings:
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - host: ubuntu-latest
            target: aarch64-unknown-linux-gnu
          - host: macos-latest
            target: x86_64-apple-darwin
          - host: macos-latest
            target: aarch64-apple-darwin
          - host: windows-latest
            target: x86_64-pc-windows-msvc
          - host: windows-latest
            target: aarch64-pc-windows-msvc
    runs-on: ${{ matrix.settings.host }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: main

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: xa11y-js/package-lock.json

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.settings.target }}

      # xa11y-linux links libxkbcommon for the Wayland input backend; the
      # Linux native bindings pull it in transitively.
      - name: Install libxkbcommon (x86_64 Linux)
        if: matrix.settings.target == 'x86_64-unknown-linux-gnu'
        run: sudo apt-get update && sudo apt-get install -y libxkbcommon-dev

      # aarch64 Linux: cross-compile via gcc-aarch64-linux-gnu, plus arm64
      # libxkbcommon from the Ubuntu Ports mirror via dpkg multiarch.
      # archive.ubuntu.com / security.ubuntu.com don't host arm64, so the
      # default DEB822 sources need `Architectures: amd64` added (they
      # don't carry one by default) to keep apt-get update from 404'ing.
      - name: Set up arm64 cross toolchain + libxkbcommon
        if: matrix.settings.target == 'aarch64-unknown-linux-gnu'
        run: |
          codename=$(lsb_release -cs)
          sudo dpkg --add-architecture arm64
          # Restrict every DEB822 entry to amd64. Replace any existing
          # Architectures: line; otherwise insert one after each Types: line.
          for f in /etc/apt/sources.list.d/*.sources; do
            [ -f "$f" ] || continue
            if grep -q '^Architectures:' "$f"; then
              sudo sed -i 's/^Architectures: .*/Architectures: amd64/' "$f"
            else
              sudo sed -i '/^Types: /a Architectures: amd64' "$f"
            fi
          done
          # Classic one-line format (sources.list / *.list).
          for f in /etc/apt/sources.list /etc/apt/sources.list.d/*.list; do
            [ -f "$f" ] || continue
            sudo sed -i 's|^deb http|deb [arch=amd64] http|g; s|^deb https|deb [arch=amd64] https|g' "$f"
          done
          sudo tee /etc/apt/sources.list.d/arm64-ports.sources >/dev/null <<EOF
          Types: deb
          URIs: http://ports.ubuntu.com/ubuntu-ports
          Suites: ${codename} ${codename}-updates ${codename}-security
          Components: main universe restricted multiverse
          Architectures: arm64
          EOF
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu libxkbcommon-dev:arm64

      - name: Install JS dev dependencies
        working-directory: xa11y-js
        run: npm ci

      - name: Build native binding (release)
        working-directory: xa11y-js
        shell: bash
        # Env vars for aarch64 Linux cross-compile. No-ops on other targets.
        # PKG_CONFIG_* points the xkbcommon -sys build at the arm64 .pc file
        # installed via the multiarch setup step.
        env:
          CC_aarch64_unknown_linux_gnu: aarch64-linux-gnu-gcc
          CXX_aarch64_unknown_linux_gnu: aarch64-linux-gnu-g++
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          PKG_CONFIG_ALLOW_CROSS: "1"
          PKG_CONFIG_PATH_aarch64_unknown_linux_gnu: /usr/lib/aarch64-linux-gnu/pkgconfig
          PKG_CONFIG_LIBDIR_aarch64_unknown_linux_gnu: /usr/lib/aarch64-linux-gnu/pkgconfig:/usr/share/pkgconfig
        # Inline the build steps rather than `npm run build` because the
        # build script chains `napi build && patch-native-dts`, and `npm
        # run build -- --target X` appends the flag to the trailing node
        # command, not to napi build.
        run: |
          npx napi build --platform --release --target ${{ matrix.settings.target }} --js native.js --dts native.d.ts
          node scripts/patch-native-dts.mjs

      - name: Upload .node binary
        uses: actions/upload-artifact@v7
        with:
          name: bindings-${{ matrix.settings.target }}
          path: xa11y-js/*.node
          if-no-files-found: error

      # native.js / native.d.ts are generated by `napi build` and are
      # identical across targets (pure JS platform-dispatch shim + type
      # definitions). Upload them once from the Linux x64 build; the
      # publish job picks them up for the umbrella package.
      - name: Upload JS shim
        if: matrix.settings.target == 'x86_64-unknown-linux-gnu'
        uses: actions/upload-artifact@v7
        with:
          name: js-shim
          path: |
            xa11y-js/native.js
            xa11y-js/native.d.ts
          if-no-files-found: error

  publish-npm:
    name: Publish to npm
    needs: [build-npm]
    if: always() && !contains(needs.*.result, 'failure') && !contains(needs.*.result, 'cancelled')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # Required for npm trusted publishing (OIDC). The npm CLI auto-detects
      # the OIDC token and uses it instead of NODE_AUTH_TOKEN.
      id-token: write
    steps:
      - uses: actions/checkout@v7
        with:
          ref: main

      # Node 24 ships with npm 11.x which supports OIDC trusted publishing.
      # Do NOT set registry-url here — setup-node injects a NODE_AUTH_TOKEN
      # .npmrc that conflicts with OIDC. The registry is configured via
      # publishConfig in package.json instead.
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: xa11y-js/package-lock.json

      - name: Install JS dev dependencies
        working-directory: xa11y-js
        run: npm ci

      - name: Download all bindings artifacts
        uses: actions/download-artifact@v8
        with:
          path: xa11y-js/artifacts
          pattern: bindings-*

      - name: Restore JS shim
        uses: actions/download-artifact@v8
        with:
          name: js-shim
          path: xa11y-js/

      - name: Create per-target npm dirs
        working-directory: xa11y-js
        run: npm run create-npm-dirs

      - name: Move .node binaries into npm dirs
        working-directory: xa11y-js
        run: npm run artifacts

      - name: List npm packages
        working-directory: xa11y-js
        run: ls -R ./npm

      # `npm publish` here triggers `prepublishOnly` → `napi pre-publish -t
      # npm --no-gh-release`, which syncs versions in npm/<triple>/,
      # rewrites the main package.json `optionalDependencies`, and
      # publishes each per-target subpackage. Then npm publishes the
      # umbrella `@crowecawcaw/xa11y` package.
      #
      # Uses OIDC trusted publishing — no NPM_TOKEN needed. Each of the
      # 7 packages has a trusted publisher configured on npmjs.com
      # pointing to this workflow. Provenance attestations are attached
      # automatically.
      - name: Publish umbrella + per-target packages
        working-directory: xa11y-js
        run: npm publish --access public

  # ── GitHub Release ─────────────────────────────────────────────────
  create-release:
    name: Create GitHub Release
    needs: [publish-crates, publish-pypi, publish-npm]
    if: always() && !contains(needs.*.result, 'failure') && !contains(needs.*.result, 'cancelled')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      # Required to call the GitHub Models inference API with GITHUB_TOKEN.
      models: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-node@v7
        with:
          node-version: 22

      - name: Get version from Cargo.toml
        id: version
        run: |
          VERSION=$(sed -n '/\[workspace\.package\]/,/\[/{s/^version = "\(.*\)"/\1/p}' Cargo.toml)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      # Ask an LLM (via GitHub's free Models inference endpoint, authenticated
      # with GITHUB_TOKEN) to turn commit messages + PR descriptions since the
      # previous tag into structured, customer-facing release notes. The model
      # is forced to return its answer through an `emit_release_notes` tool
      # call so we get validated JSON rather than free-form prose.
      - name: Generate release notes (LLM)
        id: notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          TAG="${{ steps.version.outputs.tag }}"
          NOTES_FILE="$RUNNER_TEMP/release_notes.md"
          if ! node .github/scripts/generate-release-notes.mjs "$TAG" > "$NOTES_FILE"; then
            echo "LLM release-note generation failed; falling back to plain git log." >&2
            PREV_TAG=$(git tag --sort=-v:refname | grep -A1 "^${TAG}$" | tail -1 || true)
            {
              echo "## What's Changed"
              echo ""
              if [ -n "$PREV_TAG" ] && [ "$PREV_TAG" != "$TAG" ]; then
                git log "${PREV_TAG}..${TAG}" --pretty=format:"- %s" --no-merges
                echo ""
                echo ""
                echo "**Full Changelog**: https://github.com/${GITHUB_REPOSITORY}/compare/${PREV_TAG}...${TAG}"
              else
                echo "Initial release of xa11y ${TAG}"
              fi
            } > "$NOTES_FILE"
          fi
          echo "notes-file=$NOTES_FILE" >> "$GITHUB_OUTPUT"
          echo "----- release notes -----"
          cat "$NOTES_FILE"
          echo "-------------------------"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            --title "xa11y ${{ steps.version.outputs.tag }}" \
            --notes-file "${{ steps.notes.outputs.notes-file }}" \
            --verify-tag
