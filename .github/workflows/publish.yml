name: Publish

on:
  workflow_dispatch:
    inputs:
      level:
        description: "Version bump level"
        required: true
        type: choice
        options:
          - release  # publish current version without bumping
          - patch
          - minor
          - major

env:
  CARGO_TERM_COLOR: always

jobs:
  version-bump:
    name: Bump version
    if: inputs.level != 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install cargo-release
        run: cargo install cargo-release

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        run: cargo release ${{ inputs.level }} --execute --no-confirm

      - name: Sync Python package version
        run: |
          VERSION=$(sed -n '/\[workspace\.package\]/,/\[/{s/^version = "\(.*\)"/\1/p}' Cargo.toml)
          sed -i "s/^version = \".*\"/version = \"$VERSION\"/" xa11y-python/Cargo.toml
          git add xa11y-python/Cargo.toml
          git commit -m "chore: sync xa11y-python version to $VERSION"
          git push

      # xa11y-js is excluded from the Cargo workspace, so cargo-release doesn't
      # touch its Cargo.toml / package.json. Sync them manually here.
      - name: Sync JS bindings version
        run: |
          VERSION=$(sed -n '/\[workspace\.package\]/,/\[/{s/^version = "\(.*\)"/\1/p}' Cargo.toml)
          sed -i "s/^version = \".*\"/version = \"$VERSION\"/" xa11y-js/Cargo.toml
          (cd xa11y-js && npm version "$VERSION" --no-git-tag-version --allow-same-version)
          git add xa11y-js/Cargo.toml xa11y-js/package.json xa11y-js/package-lock.json
          git commit -m "chore: sync xa11y-js version to $VERSION"
          git push

  publish-crates:
    name: Publish to crates.io
    needs: [version-bump]
    if: always() && (needs.version-bump.result == 'success' || needs.version-bump.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      # Publish crates in dependency order. On re-release (level=release),
      # versions may already exist on crates.io — skip those gracefully.
      - name: Publish all crates
        run: |
          publish_or_skip() {
            local output
            if output=$(cargo publish -p "$1" 2>&1); then
              echo "✓ $1 published"
            elif echo "$output" | grep -q "already uploaded"; then
              echo "⊘ $1 already on crates.io, skipping"
            else
              echo "$output" >&2
              return 1
            fi
          }
          publish_or_skip xa11y-core
          sleep 30
          publish_or_skip xa11y-macos
          publish_or_skip xa11y-windows
          publish_or_skip xa11y-linux
          sleep 30
          publish_or_skip xa11y
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  # ── Python wheels ──────────────────────────────────────────────────────

  build-wheels-linux:
    name: Build wheels (Linux)
    needs: [version-bump]
    if: always() && (needs.version-bump.result == 'success' || needs.version-bump.result == 'skipped')
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist
          manylinux: auto
          working-directory: xa11y-python
          before-script-linux: |
            # Install dbus development headers for zbus compilation
            if command -v yum &> /dev/null; then
              yum install -y dbus-devel
            elif command -v apt-get &> /dev/null; then
              apt-get update && apt-get install -y libdbus-1-dev
            fi

      - uses: actions/upload-artifact@v7
        with:
          name: wheels-linux-${{ matrix.target }}
          path: xa11y-python/dist

  build-wheels-macos:
    name: Build wheels (macOS)
    needs: [version-bump]
    if: always() && (needs.version-bump.result == 'success' || needs.version-bump.result == 'skipped')
    runs-on: macos-latest
    strategy:
      matrix:
        target: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist
          working-directory: xa11y-python

      - uses: actions/upload-artifact@v7
        with:
          name: wheels-macos-${{ matrix.target }}
          path: xa11y-python/dist

  build-wheels-windows:
    name: Build wheels (Windows)
    needs: [version-bump]
    if: always() && (needs.version-bump.result == 'success' || needs.version-bump.result == 'skipped')
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: PyO3/maturin-action@v1
        with:
          target: x86_64
          args: --release --out dist
          working-directory: xa11y-python

      - uses: actions/upload-artifact@v7
        with:
          name: wheels-windows-x86_64
          path: xa11y-python/dist

  build-sdist:
    name: Build sdist
    needs: [version-bump]
    if: always() && (needs.version-bump.result == 'success' || needs.version-bump.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main

      - uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
          working-directory: xa11y-python

      - uses: actions/upload-artifact@v7
        with:
          name: wheels-sdist
          path: xa11y-python/dist

  publish-pypi:
    name: Publish to PyPI
    needs: [build-wheels-linux, build-wheels-macos, build-wheels-windows, build-sdist]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist

      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/

  # ── npm (JavaScript bindings) ──────────────────────────────────────
  #
  # napi-rs publishes one package per target triple (e.g.
  # @crowecawcaw/xa11y-linux-x64-gnu) containing only the prebuilt
  # `.node` binary, plus the umbrella `@crowecawcaw/xa11y` package that
  # references them via `optionalDependencies` and dispatches at load
  # time. We build the six supported triples in a fan-out matrix, upload
  # each `.node` as an artifact, then fan back in for a single publish
  # job.

  build-npm:
    name: Build npm (${{ matrix.settings.target }})
    needs: [version-bump]
    if: always() && (needs.version-bump.result == 'success' || needs.version-bump.result == 'skipped')
    strategy:
      fail-fast: false
      matrix:
        settings:
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - host: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            setup: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu
          - host: macos-latest
            target: x86_64-apple-darwin
          - host: macos-latest
            target: aarch64-apple-darwin
          - host: windows-latest
            target: x86_64-pc-windows-msvc
          - host: windows-latest
            target: aarch64-pc-windows-msvc
    runs-on: ${{ matrix.settings.host }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: xa11y-js/package-lock.json

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.settings.target }}

      - name: Cross-compile setup
        if: matrix.settings.setup
        shell: bash
        run: ${{ matrix.settings.setup }}

      - name: Install JS dev dependencies
        working-directory: xa11y-js
        run: npm ci

      - name: Build native binding (release)
        working-directory: xa11y-js
        shell: bash
        # Env vars for aarch64 Linux cross-compile. No-ops on other targets.
        env:
          CC_aarch64_unknown_linux_gnu: aarch64-linux-gnu-gcc
          CXX_aarch64_unknown_linux_gnu: aarch64-linux-gnu-g++
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        # Inline the build steps rather than `npm run build` because the
        # build script chains `napi build && patch-native-dts`, and `npm
        # run build -- --target X` appends the flag to the trailing node
        # command, not to napi build.
        run: |
          npx napi build --platform --release --target ${{ matrix.settings.target }} --js native.js --dts native.d.ts
          node scripts/patch-native-dts.mjs

      - name: Upload .node binary
        uses: actions/upload-artifact@v7
        with:
          name: bindings-${{ matrix.settings.target }}
          path: xa11y-js/*.node
          if-no-files-found: error

      # native.js / native.d.ts are generated by `napi build` and are
      # identical across targets (pure JS platform-dispatch shim + type
      # definitions). Upload them once from the Linux x64 build; the
      # publish job picks them up for the umbrella package.
      - name: Upload JS shim
        if: matrix.settings.target == 'x86_64-unknown-linux-gnu'
        uses: actions/upload-artifact@v7
        with:
          name: js-shim
          path: |
            xa11y-js/native.js
            xa11y-js/native.d.ts
          if-no-files-found: error

  publish-npm:
    name: Publish to npm
    needs: [build-npm]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # Required for npm trusted publishing (OIDC). The npm CLI auto-detects
      # the OIDC token and uses it instead of NODE_AUTH_TOKEN.
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main

      # Node 24 ships with npm 11.x which supports OIDC trusted publishing.
      # Do NOT set registry-url here — setup-node injects a NODE_AUTH_TOKEN
      # .npmrc that conflicts with OIDC. The registry is configured via
      # publishConfig in package.json instead.
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: xa11y-js/package-lock.json

      - name: Install JS dev dependencies
        working-directory: xa11y-js
        run: npm ci

      - name: Download all bindings artifacts
        uses: actions/download-artifact@v8
        with:
          path: xa11y-js/artifacts
          pattern: bindings-*

      - name: Restore JS shim
        uses: actions/download-artifact@v8
        with:
          name: js-shim
          path: xa11y-js/

      - name: Create per-target npm dirs
        working-directory: xa11y-js
        run: npm run create-npm-dirs

      - name: Move .node binaries into npm dirs
        working-directory: xa11y-js
        run: npm run artifacts

      - name: List npm packages
        working-directory: xa11y-js
        run: ls -R ./npm

      # `npm publish` here triggers `prepublishOnly` → `napi pre-publish -t
      # npm --no-gh-release`, which syncs versions in npm/<triple>/,
      # rewrites the main package.json `optionalDependencies`, and
      # publishes each per-target subpackage. Then npm publishes the
      # umbrella `@crowecawcaw/xa11y` package.
      #
      # Uses OIDC trusted publishing — no NPM_TOKEN needed. Each of the
      # 7 packages has a trusted publisher configured on npmjs.com
      # pointing to this workflow. Provenance attestations are attached
      # automatically.
      - name: Publish umbrella + per-target packages
        working-directory: xa11y-js
        run: npm publish --access public

  # ── GitHub Release ─────────────────────────────────────────────────
  create-release:
    name: Create GitHub Release
    needs: [publish-crates, publish-pypi, publish-npm]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Get version from Cargo.toml
        id: version
        run: |
          VERSION=$(sed -n '/\[workspace\.package\]/,/\[/{s/^version = "\(.*\)"/\1/p}' Cargo.toml)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Generate release notes
        id: notes
        run: |
          TAG="v${{ steps.version.outputs.version }}"
          # Find the previous tag
          PREV_TAG=$(git tag --sort=-v:refname | grep -A1 "^${TAG}$" | tail -1)
          if [ "$PREV_TAG" = "$TAG" ] || [ -z "$PREV_TAG" ]; then
            # First release or no previous tag
            echo "body=Initial release of xa11y v${{ steps.version.outputs.version }}" >> "$GITHUB_OUTPUT"
          else
            # Generate changelog from commits between tags
            {
              echo 'body<<RELEASE_EOF'
              echo "## What's Changed"
              echo ""
              git log "${PREV_TAG}..${TAG}" --pretty=format:"- %s" --no-merges
              echo ""
              echo ""
              echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${TAG}"
              echo 'RELEASE_EOF'
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            --title "xa11y ${{ steps.version.outputs.tag }}" \
            --notes "${{ steps.notes.outputs.body }}" \
            --verify-tag
