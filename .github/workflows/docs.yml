name: Deploy Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          # Full history so generate_sitemap.py can use `git log` to set
          # accurate <lastmod> values from each source file's commit time.
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            docs/site/package-lock.json
            xa11y-js/package-lock.json

      # Rust toolchain is required by the `napi build` step below, which
      # compiles xa11y-js's native binding to produce native.d.ts for the JS
      # API doc generator. Rust API reference itself is hosted on docs.rs.
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            xa11y-js/target
          key: docs-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: docs-cargo-

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Sphinx
        run: pip install sphinx sphinx-rtd-theme sphinx-autoapi

      # napi build links xa11y-js → xa11y → xa11y-linux on the Linux docs
      # runner; xa11y-linux needs libxkbcommon at link time. Installed from
      # the shared package list ([link] group).
      - name: Install system dependencies
        uses: xa11y/setup-a11y@v1
        with:
          package-groups: link
          setup-display: "false"
          setup-atspi: "false"

      # The JS API doc generator reads xa11y-js/native.d.ts, which is
      # produced by napi-rs from the Rust source. Build + patch it here
      # so the generator has a fresh source of truth to read from.
      - name: Install xa11y-js dev dependencies
        working-directory: xa11y-js
        run: npm ci

      - name: Build xa11y-js native binding (for type stubs)
        working-directory: xa11y-js
        run: npx napi build --platform --js native.js --dts native.d.ts

      - name: Patch native.d.ts
        working-directory: xa11y-js
        run: node scripts/patch-native-dts.mjs

      - name: Check doc tables
        run: python docs/check_tables.py

      - name: Generate Python API docs
        run: python docs/generate_python_api.py

      - name: Generate JavaScript API docs
        run: python docs/generate_js_api.py

      # After generation, so links into the generated API pages resolve.
      - name: Check doc links
        run: python docs/check_links.py

      - name: Install npm dependencies
        working-directory: docs/site
        run: npm ci

      - name: Build Starlight site
        working-directory: docs/site
        run: npm run build

      - name: Check rendered doc tables
        run: python docs/check_tables.py --rendered docs/site/dist

      - name: Build Python API docs (Sphinx)
        working-directory: docs/python
        run: sphinx-build -b html . _build/html

      - name: Copy Python docs into site output
        run: cp -r docs/python/_build/html docs/site/dist/api/python/reference

      # Run after every other doc source has been copied into dist/ so the
      # sitemap reflects Starlight pages and Python API items — all
      # auto-discovered, none hardcoded.
      - name: Generate sitemap
        run: python docs/generate_sitemap.py

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs/site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
