name: Deploy Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: docs/site/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: docs-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: docs-cargo-

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Install Sphinx
        run: pip install sphinx sphinx-rtd-theme sphinx-autoapi

      - name: Install npm dependencies
        working-directory: docs/site
        run: npm ci

      - name: Build Starlight site
        working-directory: docs/site
        run: npm run build

      - name: Generate Rust API docs
        run: cargo doc -p xa11y --no-deps

      - name: Build Python API docs (Sphinx)
        working-directory: docs/python
        run: sphinx-build -b html . _build/html

      - name: Copy Rust docs into site output
        run: cp -r target/doc docs/site/dist/api/rust/reference

      - name: Copy Python docs into site output
        run: cp -r docs/python/_build/html docs/site/dist/api/python/reference

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
