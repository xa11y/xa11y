name: Publish Python

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g. 0.0.2). Leave empty to publish current version."
        required: false
        type: string

defaults:
  run:
    working-directory: python

jobs:
  build:
    name: Build package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install build tools
        run: pip install build

      - name: Set version
        if: inputs.version != ''
        run: |
          sed -i "s/^version = .*/version = \"${{ inputs.version }}\"/" pyproject.toml
          sed -i "s/^__version__ = .*/__version__ = \"${{ inputs.version }}\"/" xa11y/__init__.py

      - name: Build sdist and wheel
        run: python -m build

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: python/dist/

  publish:
    name: Publish to PyPI
    needs: [build]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # trusted publishing (OIDC)
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
