name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

jobs:
  # Run unit tests on all platforms
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform_crate: xa11y-linux
          - os: macos-latest
            platform_crate: xa11y-macos
          - os: windows-latest
            platform_crate: xa11y-windows
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build all crates
        run: cargo build --workspace

      - name: Run unit tests (xa11y-core)
        run: cargo test -p xa11y-core

      - name: Run unit tests (platform backend)
        run: cargo test -p ${{ matrix.platform_crate }}

      - name: Run unit tests (xa11y)
        run: cargo test -p xa11y --test unit_test

      - name: Run all workspace tests
        run: cargo test --workspace

  # Linux integration tests with AT-SPI2 + accesskit test app
  integ-test:
    name: Integration Tests (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-integ-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-integ-

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            xvfb \
            dbus \
            libxkbcommon-x11-0 \
            libxkbcommon-x11-dev
          # at-spi2-core provides the daemons; on Ubuntu 24.04 only at-spi2-common may exist
          sudo apt-get install -y at-spi2-core || sudo apt-get install -y at-spi2-common
          # dbus-x11 provides dbus-launch; not needed since we use dbus-run-session,
          # but install if available for broader compat
          sudo apt-get install -y dbus-x11 || true

      - name: Run integration tests
        run: ./run_integ_tests.sh

  # Lint and format checks (single OS is sufficient)
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain with clippy and rustfmt
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-lint-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-lint-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --workspace --all-targets

  # Cross-compilation check (ensures each platform crate compiles for its target)
  cross-check:
    name: Cross-check (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-apple-darwin
          - aarch64-apple-darwin
          - x86_64-unknown-linux-gnu
          - aarch64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-cross-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-cross-${{ matrix.target }}-

      - name: Check compilation (core crate)
        run: cargo check -p xa11y-core --target ${{ matrix.target }}

  # Fuzz testing (short runs to catch regressions)
  fuzz:
    name: Fuzz (10s per target)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            xa11y-fuzz/fuzz/target
          key: ${{ runner.os }}-cargo-fuzz-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-fuzz-

      - name: Run fuzz targets
        run: |
          cd xa11y-fuzz/fuzz
          for target in tree_ops selector query serde; do
            echo "=== Fuzzing $target for 10s ==="
            cargo +nightly fuzz run $target -- -max_total_time=10 || true
          done
