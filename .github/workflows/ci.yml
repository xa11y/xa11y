name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# Cancel superseded runs on a branch/PR so rapid pushes don't pile up full
# matrix runs. We never cancel pushes to main/master (release-relevant), only
# in-progress PR runs that a newer commit has obsoleted.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

jobs:
  # ── Linux: unit tests + AccessKit Rust integ tests ────────────────
  linux:
    name: Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Rust
        uses: ./.github/actions/setup-rust

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install system dependencies
        # Package list lives in the xa11y/setup-a11y repo (apt-packages.txt).
        # run_integ_tests.sh brings up its own Xvfb + D-Bus + AT-SPI, so this
        # is install-only here.
        uses: xa11y/setup-a11y@v1
        with:
          package-groups: base gtk
          setup-display: "false"
          setup-atspi: "false"

      - name: Run unit tests
        run: cargo test --workspace

      - name: Run integration tests
        run: ./scripts/run_integ_tests.sh

  # ── Linux Wayland uinput: e2e input-sim coverage. Drives
  #    LinuxInputProvider through its public API on the runner, then
  #    reads events back via libevdev and asserts the wire-level codes/
  #    values are correct. Compositor-agnostic — the kernel uinput
  #    device works the same regardless of Wayland session.
  #
  #    Runs directly on the runner (not in a container) because Docker's
  #    /dev tmpfs isolation means udev's freshly-minted /dev/input/event*
  #    nodes for our virtual device aren't visible inside a container,
  #    even with --device /dev/uinput and -v /dev/input:/dev/input.
  #    The Containerfile.wayland-uinput + xtask path is still useful for
  #    developers running on non-Linux hosts.
  linux-wayland-uinput:
    name: Linux Wayland (uinput)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Rust
        uses: ./.github/actions/setup-rust
        with:
          cache-key: uinput

      - name: Install system dependencies
        # libxkbcommon-dev: keysym → keycode lookup in the backend.
        # libevdev-dev: event readback in the e2e test.
        run: sudo apt-get update && sudo apt-get install -y libxkbcommon-dev libevdev-dev

      - name: Load uinput kernel module
        # GitHub-hosted Ubuntu runners build the uinput driver as a
        # module and don't load it by default.
        run: sudo modprobe uinput

      - name: Grant access to /dev/uinput
        # Host udev gives /dev/uinput mode 0660 root:input by default.
        # Easiest way to let the cargo test process open it without
        # spawning under sudo (which loses cargo's PATH/env): chmod the
        # device. Equivalent to a usermod + relog on a developer box.
        run: sudo chmod 0666 /dev/uinput

      - name: Probe input subsystem (baseline)
        # Diagnostic: capture what the runner has under /dev/input *before*
        # any test runs, plus whether systemd-udevd is alive. Helps
        # disambiguate "udev isn't creating event nodes" from "we can't
        # read them due to permissions".
        run: |
          echo "--- /dev/uinput ---"
          ls -l /dev/uinput || true
          echo "--- /dev/input (if any) ---"
          ls -la /dev/input/ 2>/dev/null || echo "no /dev/input directory"
          echo "--- /sys/class/input ---"
          ls /sys/class/input/ 2>/dev/null || echo "no /sys/class/input"
          echo "--- udev daemon ---"
          systemctl status systemd-udevd --no-pager -l 2>&1 | head -10 || true
          echo "--- groups ---"
          id

      - name: Pre-grant access to future event nodes via udev rule
        # Default udev gives /dev/input/event* mode 0660 root:input.
        # Add a rule that drops to mode 0666 so the unprivileged cargo
        # test process can read events back from any newly-created event
        # node (including the one our virtual device produces).
        run: |
          echo 'KERNEL=="event[0-9]*", MODE="0666"' | \
            sudo tee /etc/udev/rules.d/99-xa11y-test.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --type=devices --subsystem-match=input || true
          sudo udevadm settle

      - name: Run unit + smoke tests
        run: cargo test -p xa11y-linux --lib && cargo test -p xa11y-linux --test wayland_smoke

      - name: Run uinput e2e tests
        # The test creates a uinput device, host udev populates the
        # /dev/input/eventN node, the test reads events back via evdev.
        # --test-threads=1 because tests share the kernel uinput device.
        run: |
          unset DISPLAY
          cargo test -p xa11y-linux --test wayland_input_e2e -- \
            --ignored --test-threads=1 --nocapture

  # ── macOS: unit tests ──────────────────────────────────────────────
  macos:
    name: macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Rust
        uses: ./.github/actions/setup-rust

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run unit tests
        run: cargo test --workspace

      # macOS Rust integration tests (including the AX-call-count regression
      # tests in `xa11y-macos/src/ax.rs`) are intentionally NOT wired into CI.
      # They require kTCCServiceAccessibility to be granted to the Rust test
      # harness binary, whose path is cargo-hashed (e.g.
      # `target/debug/deps/integ_test-abc123`). Granting TCC to moving paths
      # has proven fragile under macos-latest runners (hash changes across
      # builds; tccd reloads race with the tests). Developers run them
      # locally via `./scripts/run_integ_tests_macos.sh` where their terminal
      # already has TCC. The ax_calls_* tests are #[ignore]d so they are
      # skipped by `cargo test --workspace`.

      # Qt-on-macOS compat/actions/events run in the `integ` matrix below
      # (macos-latest × qt). The macOS AX tree exposes Qt widgets findably
      # via the locator walk, so the suites pass without special handling.

  # ── Windows: unit tests + AccessKit Rust integ tests ───────────────
  windows:
    name: Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Rust
        uses: ./.github/actions/setup-rust

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run unit tests
        run: cargo test --workspace

      # Rust integration tests, including the UIA event subscriptions.
      # Hosted windows-latest runners DO have an interactive desktop session
      # (the same runner that executes the Qt UIA tests below), so UIA works
      # fine here. The harness script launches the AccessKit test app in the
      # background, waits for it to register with UIA, runs the `#[ignore]`
      # integration tests with --test-threads=1, and tears the app down.
      - name: Run Rust integration tests
        shell: pwsh
        run: .\scripts\run_integ_tests_windows.ps1

  # ── Compatibility integ matrix: one app × one OS × all language suites ──
  #
  # Each matrix cell starts the test app once, then runs the Python, JS, and
  # CLI suites against it via tests/harness/launch.py — the same entry point
  # `cargo xtask test-<app>` uses locally (scripts/run_app_suite.sh), so local
  # and CI share one code path. This replaced the old per-language per-app
  # per-OS jobs and their run_<app>_tests.sh scripts.
  #
  # Each cell builds the workspace itself; the shared sccache in setup-rust
  # keeps that cheap (warm rustc cache reused across cells and runs) without
  # serializing the matrix behind a build-once job.
  integ:
    name: Integ (${{ matrix.app }}) on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,  app: accesskit }
          # AccessKit on macOS/Windows is covered by the Windows Rust integ
          # job and the local macOS harness; those integ cells ran no language
          # suites (cli+js are skipped for accesskit, and python is skipped off
          # Linux — see suite_skips_by_app in tests/harness/launch.py), so they
          # only burned a build with nothing to test. Dropped.
          - { os: ubuntu-latest,  app: qt }
          - { os: ubuntu-latest,  app: gtk }
          - { os: ubuntu-latest,  app: tauri }
          - { os: ubuntu-latest,  app: electron }
          - { os: macos-latest,   app: cocoa }
          - { os: macos-latest,   app: tauri }
          - { os: macos-latest,   app: qt }
          - { os: windows-latest, app: qt }
          # egui (eframe) — pure-Rust cross-platform GUI driven through
          # AccessKit. Outside the workspace so we build it explicitly per-OS.
          - { os: ubuntu-latest,  app: egui }
          - { os: macos-latest,   app: egui }
          - { os: windows-latest, app: egui }
    steps:
      - uses: actions/checkout@v7

      - name: Set up Rust
        uses: ./.github/actions/setup-rust
        with:
          cache-key: integ

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: xa11y-js/package-lock.json

      # ── Accessibility environment (Linux only) ─────────────────────
      # Install the package set AND bring up Xvfb + D-Bus + AT-SPI (and a
      # window manager for egui, whose AccessKit bridge only publishes its
      # tree once the window is focused). The daemons persist into the later
      # harness step, and the action exports XA11Y_A11Y_READY so launch.py
      # skips starting a second copy. Package list:
      # xa11y/setup-a11y repo (apt-packages.txt).
      - name: Set up accessibility environment
        if: runner.os == 'Linux'
        uses: xa11y/setup-a11y@v1
        with:
          package-groups: base gtk electron
          setup-window-manager: ${{ matrix.app == 'egui' }}

      # ── Build Rust workspace (all workspace test-app binaries) ─────
      - name: Build Rust workspace
        run: cargo build --workspace

      # ── Tauri app (not in workspace — has its own Cargo.lock) ──────
      - name: Cache Tauri test app build
        if: matrix.app == 'tauri'
        uses: actions/cache@v5
        with:
          path: test-apps/tauri/target
          key: ${{ runner.os }}-tauri-app-${{ hashFiles('test-apps/tauri/Cargo.lock', 'test-apps/tauri/Cargo.toml', 'test-apps/tauri/build.rs', 'test-apps/tauri/tauri.conf.json', 'test-apps/tauri/src/**', 'test-apps/tauri/frontend/**') }}
          restore-keys: |
            ${{ runner.os }}-tauri-app-

      - name: Build Tauri test app
        if: matrix.app == 'tauri'
        run: cargo build --manifest-path test-apps/tauri/Cargo.toml --locked

      # ── egui app (not in workspace — heavy eframe dependency tree) ──
      - name: Cache egui test app build
        if: matrix.app == 'egui'
        uses: actions/cache@v5
        with:
          path: test-apps/egui/target
          key: ${{ runner.os }}-egui-app-${{ hashFiles('test-apps/egui/Cargo.toml', 'test-apps/egui/Cargo.lock', 'test-apps/egui/src/**') }}
          restore-keys: |
            ${{ runner.os }}-egui-app-

      - name: Build egui test app
        if: matrix.app == 'egui'
        run: cargo build --manifest-path test-apps/egui/Cargo.toml --locked

      # ── Electron node_modules ──────────────────────────────────────
      - name: Cache Electron node_modules
        if: matrix.app == 'electron'
        uses: actions/cache@v5
        with:
          path: test-apps/electron/node_modules
          key: ${{ runner.os }}-electron-app-${{ hashFiles('test-apps/electron/package.json') }}
          restore-keys: |
            ${{ runner.os }}-electron-app-

      - name: Install Electron node_modules
        if: matrix.app == 'electron'
        working-directory: test-apps/electron
        run: npm install

      # ── Build xa11y-python in a venv ──────────────────────────────
      - name: Create virtualenv and install Python tools
        if: runner.os != 'Windows'
        run: |
          python -m venv .venv-integ
          .venv-integ/bin/pip install maturin
          .venv-integ/bin/pip install -r tests/requirements.txt

      - name: Create virtualenv and install Python tools (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          python -m venv .venv-integ
          .venv-integ/Scripts/pip.exe install maturin
          .venv-integ/Scripts/pip.exe install -r tests/requirements.txt

      - name: Build & install xa11y Python bindings
        if: runner.os != 'Windows'
        working-directory: xa11y-python
        run: ../.venv-integ/bin/pip install -e .

      - name: Build & install xa11y Python bindings (Windows)
        if: runner.os == 'Windows'
        working-directory: xa11y-python
        shell: bash
        run: ../.venv-integ/Scripts/pip.exe install -e .

      # ── Build xa11y-js ─────────────────────────────────────────────
      - name: Cache xa11y-js node_modules and native target
        uses: actions/cache@v5
        with:
          path: |
            xa11y-js/node_modules
            xa11y-js/target
          key: ${{ runner.os }}-xa11y-js-${{ hashFiles('xa11y-js/package-lock.json', 'xa11y-js/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-xa11y-js-

      - name: Install xa11y-js dependencies and build
        working-directory: xa11y-js
        run: npm install && npm run build:debug

      # ── App-specific Python requirements ──────────────────────────
      - name: Install Qt Python requirements
        if: matrix.app == 'qt' && runner.os != 'Windows'
        run: .venv-integ/bin/pip install -r test-apps/qt/requirements.txt

      - name: Install Qt Python requirements (Windows)
        if: matrix.app == 'qt' && runner.os == 'Windows'
        shell: bash
        run: .venv-integ/Scripts/pip.exe install -r test-apps/qt/requirements.txt

      - name: Install GTK Python requirements
        if: matrix.app == 'gtk'
        run: .venv-integ/bin/pip install -r test-apps/gtk/requirements.txt

      # ── Grant TCC on macOS ─────────────────────────────────────────
      # The grant must target the *resolved* interpreter (TCC matches the real
      # on-disk binary, not the venv symlink), so compute it first, then let
      # setup-a11y perform the grant via its macos-tcc-client path — the same
      # sqlite write lives in scripts/grant_macos_tcc.sh for local use.
      - name: Resolve venv python for TCC grant
        if: runner.os == 'macOS'
        run: echo "TCC_CLIENT=$(.venv-integ/bin/python -c 'import sys; print(sys.executable)')" >> "$GITHUB_ENV"

      - name: Grant accessibility TCC permission
        if: runner.os == 'macOS'
        uses: xa11y/setup-a11y@v1
        with:
          macos-tcc-client: ${{ env.TCC_CLIENT }}

      # Front-most focus on macOS is claimed at app-launch time, not here: the
      # harness actively activates the test app and polls until it is verified
      # frontmost (tests.helpers.ensure_macos_frontmost), replacing the old
      # hardcoded `killall` list of focus-stealing onboarding processes. That
      # name-based approach rotted whenever GitHub rolled a new runner image
      # with a different offender (issue #230); the active-claim approach is
      # runner-image-agnostic and names whatever grabbed focus on failure.

      # ── Cache Cocoa test app binary ────────────────────────────────
      - name: Cache Cocoa test app binary
        if: matrix.app == 'cocoa'
        uses: actions/cache@v5
        with:
          path: test-apps/cocoa/xa11y-cocoa-test-app
          key: ${{ runner.os }}-cocoa-app-${{ hashFiles('test-apps/cocoa/main.swift', 'test-apps/cocoa/Makefile') }}

      # ── Build Cocoa test app (Swift, macOS-only) ───────────────────
      # The Cocoa app is NOT part of the Cargo workspace, so the "Build Rust
      # workspace" step above doesn't produce it, and launch.py — unlike
      # run_app_suite.sh — never builds it. Without this step the binary only
      # ever exists when restored from the cache above, so the first time that
      # entry is evicted the harness has nothing to launch and the job dies.
      # Build only on a cache miss (mirrors the `[ ! -f ... ]` guard in
      # scripts/run_app_suite.sh) so a cache hit short-circuits the swiftc run,
      # and so the post-job cache save always has a binary to store.
      - name: Build Cocoa test app
        if: matrix.app == 'cocoa'
        run: |
          if [ ! -f test-apps/cocoa/xa11y-cocoa-test-app ]; then
            make -C test-apps/cocoa build
          fi

      # ── Run harness ───────────────────────────────────────────────
      # On Linux, DISPLAY / D-Bus / AT-SPI (+ the egui window manager) were
      # already brought up by the setup-a11y step above, and XA11Y_A11Y_READY
      # tells launch.py not to start a second AT-SPI stack.
      - name: Run integration harness (Linux)
        if: runner.os == 'Linux'
        run: .venv-integ/bin/python tests/harness/launch.py ${{ matrix.app }} python js cli

      - name: Run integration harness (macOS)
        if: runner.os == 'macOS'
        run: .venv-integ/bin/python tests/harness/launch.py ${{ matrix.app }} python js cli

      - name: Run integration harness (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: .venv-integ/Scripts/python.exe tests/harness/launch.py ${{ matrix.app }} python js cli

  # ── Published end-to-end examples (issue #192) ─────────────────────
  #
  # Runs the four `examples/` files against the AccessKit test app on
  # Linux. The examples are self-contained: each one launches the app,
  # polls for registration, exercises the public API, and tears the
  # subprocess down. CI here guarantees they don't rot.
  #
  # Linux-only for now — macOS TCC and Windows shell quirks make the
  # cross-OS matrix flaky enough to be noise in this PR. The Rust
  # integ matrix already covers AccessKit on macOS and Windows.
  examples:
    name: Examples on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
    steps:
      - uses: actions/checkout@v7

      - name: Set up Rust
        uses: ./.github/actions/setup-rust
        with:
          cache-key: examples

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: xa11y-js/package-lock.json

      # Install the package set AND bring up Xvfb + D-Bus + AT-SPI, which
      # persist into the "Run examples" step (and export DISPLAY/DBUS to
      # GITHUB_ENV). Package list:
      # xa11y/setup-a11y repo (apt-packages.txt).
      - name: Set up accessibility environment
        uses: xa11y/setup-a11y@v1
        with:
          package-groups: base

      # ── Build everything the examples need ───────────────────────────
      - name: Build workspace (test app, CLI, Rust example)
        run: cargo build --workspace

      - name: Create virtualenv and install Python bindings
        run: |
          python -m venv .venv-examples
          .venv-examples/bin/pip install maturin
          .venv-examples/bin/pip install -e xa11y-python

      - name: Cache xa11y-js node_modules and native target
        uses: actions/cache@v5
        with:
          path: |
            xa11y-js/node_modules
            xa11y-js/target
          key: ${{ runner.os }}-xa11y-js-examples-${{ hashFiles('xa11y-js/package-lock.json', 'xa11y-js/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-xa11y-js-examples-

      - name: Build xa11y-js bindings
        working-directory: xa11y-js
        run: npm install && npm run build:debug

      # ── Run all four examples ────────────────────────────────────────
      # DISPLAY / D-Bus / AT-SPI were brought up by the setup-a11y step above
      # and persist here, so each example can launch the test app and connect.
      - name: Run examples
        env:
          RUST_BACKTRACE: "1"
        run: |
          set -euo pipefail
          echo "::group::Rust example"   ; cargo run -p xa11y-example-end-to-end          ; echo "::endgroup::"
          echo "::group::Python example" ; .venv-examples/bin/python -u examples/python/end_to_end.py ; echo "::endgroup::"
          echo "::group::JS example"     ; node examples/js/end_to_end.mjs                ; echo "::endgroup::"
          echo "::group::CLI example"    ; bash examples/cli/end_to_end.sh                ; echo "::endgroup::"

  # ── Lint & format ──────────────────────────────────────────────────
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Rust
        uses: ./.github/actions/setup-rust
        with:
          components: clippy, rustfmt
          cache-key: lint

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Check JS bindings formatting
        working-directory: xa11y-js
        run: cargo fmt -- --check

      - name: Check READMEs are in sync
        run: cargo xtask sync-readmes --check

      - name: Run clippy
        run: cargo clippy --workspace --all-targets

      - name: Run clippy on JS bindings
        working-directory: xa11y-js
        run: cargo clippy --all-targets

      - name: Check bindings parity
        run: cargo xtask check-bindings-parity

      - name: Check test coverage matrix
        run: python tests/matrix_check.py

  # ── License check ─────────────────────────────────────────────────
  license-check:
    name: License Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Cache cargo-deny binary
        id: cache-cargo-deny
        uses: actions/cache@v5
        with:
          path: ~/.cargo/bin/cargo-deny
          key: cargo-deny-${{ runner.os }}-${{ runner.arch }}

      - name: Install cargo-deny
        if: steps.cache-cargo-deny.outputs.cache-hit != 'true'
        run: cargo install cargo-deny --locked

      - name: Check licenses
        run: cargo deny check licenses

  # ── Cross-compilation ──────────────────────────────────────────────
  cross-compile:
    name: Cross-compile check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Rust
        uses: ./.github/actions/setup-rust
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin,x86_64-unknown-linux-gnu,aarch64-unknown-linux-gnu
          cache-key: cross

      - name: Check xa11y-core compiles for all targets
        run: |
          for target in x86_64-apple-darwin aarch64-apple-darwin x86_64-unknown-linux-gnu aarch64-unknown-linux-gnu; do
            echo "=== Checking $target ==="
            cargo check -p xa11y-core --target $target
          done

  # ── Python bindings ───────────────────────────────────────────────
  python:
    name: Python bindings
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Rust
        uses: ./.github/actions/setup-rust
        with:
          cache-key: python

      # xa11y-linux links libxkbcommon for the Wayland input backend; the
      # Python wheel embeds xa11y and pulls the .so in transitively at link
      # time. Installed from the shared package list ([link] group).
      - name: Install system dependencies
        uses: xa11y/setup-a11y@v1
        with:
          package-groups: link
          setup-display: "false"
          setup-atspi: "false"

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Create virtualenv and install tools
        run: |
          python -m venv .venv
          .venv/bin/pip install maturin ruff pytest

      - name: Ruff lint
        working-directory: xa11y-python
        run: ../.venv/bin/ruff check python/ tests/

      - name: Ruff format
        working-directory: xa11y-python
        run: ../.venv/bin/ruff format --check python/ tests/

      - name: Build & install
        working-directory: xa11y-python
        run: ../.venv/bin/maturin develop --release

      - name: Run tests
        working-directory: xa11y-python
        run: ../.venv/bin/pytest tests/ -v

  # ── Docs build ──────────────────────────────────────────────────
  docs:
    name: Docs build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # Shares the sccache compilation cache with the js/integ jobs that build
      # the same xa11y-js native binding; rust-cache stores xa11y-js/target.
      - name: Set up Rust
        uses: ./.github/actions/setup-rust
        with:
          cache-key: docs
          workspaces: xa11y-js -> target

      # napi build links xa11y-js → xa11y → xa11y-linux on the Linux
      # docs runner; xa11y-linux now needs libxkbcommon at link time.
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libxkbcommon-dev

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            docs/site/package-lock.json
            xa11y-js/package-lock.json

      # The JS API doc generator reads xa11y-js/native.d.ts, which is
      # produced by napi-rs from the Rust source. Build + patch it here
      # so the generator has a fresh source of truth to read from.
      - name: Install xa11y-js dev deps
        working-directory: xa11y-js
        run: npm ci

      - name: Build xa11y-js native binding (for type stubs)
        working-directory: xa11y-js
        run: npx napi build --platform --js native.js --dts native.d.ts

      - name: Patch native.d.ts
        working-directory: xa11y-js
        run: node scripts/patch-native-dts.mjs

      - name: Check doc tables
        run: python docs/check_tables.py

      - name: Generate Python API docs
        run: python docs/generate_python_api.py

      - name: Generate JavaScript API docs
        run: python docs/generate_js_api.py

      # After generation, so links into the generated API pages resolve.
      - name: Check doc links
        run: python docs/check_links.py

      - name: Install Starlight npm dependencies
        working-directory: docs/site
        run: npm ci

      - name: Build Starlight site
        working-directory: docs/site
        run: npm run build

      - name: Check rendered doc tables
        run: python docs/check_tables.py --rendered docs/site/dist

  # ── JavaScript bindings ───────────────────────────────────────────
  js:
    name: JS bindings (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7

      # Shares the sccache compilation cache with the docs/integ jobs that
      # build the same native binding; rust-cache stores xa11y-js/target.
      - name: Set up Rust
        uses: ./.github/actions/setup-rust
        with:
          cache-key: js
          workspaces: xa11y-js -> target

      # xa11y-js → xa11y → xa11y-linux requires libxkbcommon to link on
      # Linux. macOS / Windows skip this — those runners don't pull
      # xa11y-linux in.
      # libxkbcommon-dev (xa11y-linux Wayland input backend) via the shared
      # package list. The action no-ops the apt step off Linux.
      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        uses: xa11y/setup-a11y@v1
        with:
          package-groups: link
          setup-display: "false"
          setup-atspi: "false"

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: xa11y-js/package-lock.json

      - name: Install JS dev dependencies
        working-directory: xa11y-js
        run: npm ci

      - name: Cargo check (warnings as errors)
        working-directory: xa11y-js
        env:
          RUSTFLAGS: -Dwarnings
        run: cargo check

      - name: Cargo fmt --check
        working-directory: xa11y-js
        run: cargo fmt -- --check

      - name: Build native binding (debug)
        working-directory: xa11y-js
        run: npx napi build --platform --js native.js --dts native.d.ts

      - name: Patch native.d.ts
        working-directory: xa11y-js
        run: node scripts/patch-native-dts.mjs

      - name: Type-check (tsc --noEmit)
        working-directory: xa11y-js
        run: npx tsc --noEmit

      - name: Run unit tests
        working-directory: xa11y-js
        run: npm test

  # ── Fuzz testing ───────────────────────────────────────────────────
  fuzz:
    name: Fuzz (10s per target)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Rust (nightly)
        uses: ./.github/actions/setup-rust
        with:
          toolchain: nightly
          cache-key: fuzz
          # cargo-fuzz builds into xa11y/fuzz/target; rust-cache covers
          # ~/.cargo (registry/git) automatically.
          workspaces: xa11y/fuzz -> target

      # Cache the cargo-fuzz binary so we don't recompile it from source every
      # run (mirrors the cargo-deny cache in license-check).
      - name: Cache cargo-fuzz binary
        id: cache-cargo-fuzz
        uses: actions/cache@v5
        with:
          path: ~/.cargo/bin/cargo-fuzz
          key: cargo-fuzz-${{ runner.os }}-${{ runner.arch }}

      # The fuzz binaries link xa11y → xa11y-linux, which needs libxkbcommon
      # at link time ([link] group). Without it the targets fail to link
      # (rust-lld: unable to find -lxkbcommon) before any fuzzing happens.
      - name: Install link dependencies
        uses: xa11y/setup-a11y@v1
        with:
          package-groups: link
          setup-display: "false"
          setup-atspi: "false"

      - name: Install cargo-fuzz
        if: steps.cache-cargo-fuzz.outputs.cache-hit != 'true'
        run: cargo install cargo-fuzz

      - name: Run fuzz targets
        # A libFuzzer crash exits non-zero and writes a reproducer under
        # fuzz/artifacts/. We run every target even if an earlier one crashes
        # (so a single failure doesn't mask the others), then fail the job if
        # any of them crashed. Previously this used `|| true`, which not only
        # swallowed real crashes (Tenet 1) but had also masked the fact that
        # this step was cd'ing into the wrong directory (xa11y-fuzz/fuzz, the
        # live provider fuzzer, which has no cargo-fuzz project) and naming
        # targets that don't exist (query, serde). The libFuzzer targets live
        # in xa11y/fuzz and are tree_ops + selector.
        run: |
          cd xa11y/fuzz
          failed=""
          for target in tree_ops selector; do
            echo "=== Fuzzing $target for 10s ==="
            if ! cargo +nightly fuzz run "$target" -- -max_total_time=10; then
              echo "::error::fuzz target '$target' crashed (reproducer in xa11y/fuzz/artifacts/$target/)"
              failed="$failed $target"
            fi
          done
          if [ -n "$failed" ]; then
            echo "Fuzz targets crashed:$failed"
            exit 1
          fi
