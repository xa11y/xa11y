name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

jobs:
  # ── Linux: unit tests + integration tests + Qt tests ─────────────
  linux:
    name: Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            xvfb dbus dbus-x11 \
            at-spi2-core \
            libxkbcommon-x11-0 libxkbcommon-x11-dev \
            libxcursor1 libxrandr2 libxi6 \
            libx11-xcb1 libxcb-render0 libxcb-shape0 libxcb-xfixes0 \
            libegl1 libglib2.0-0 libfontconfig1 libdbus-1-3 \
            libxcb-cursor0 libxcb-icccm4 libxcb-keysyms1 \
            libxcb-image0 libxcb-render-util0 libxcb-xkb1 \
            libgtk-4-dev gir1.2-gtk-4.0 libgirepository-2.0-dev libcairo2-dev \
            libwebkit2gtk-4.1-dev libssl-dev librsvg2-dev libgtk-3-dev

      - name: Run unit tests
        run: cargo test --workspace

      - name: Run integration tests
        run: ./scripts/run_integ_tests.sh

      - name: Run Qt integration tests
        run: ./scripts/run_qt_tests.sh

      - name: Run GTK integration tests
        run: ./scripts/run_gtk_tests.sh

      - name: Run Tauri integration tests
        run: ./scripts/run_tauri_tests.sh

  # ── macOS: unit tests ──────────────────────────────────────────────
  macos:
    name: macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Cache Cocoa test app binary
        uses: actions/cache@v5
        with:
          path: test-apps/cocoa/xa11y-cocoa-test-app
          key: ${{ runner.os }}-cocoa-app-${{ hashFiles('test-apps/cocoa/main.swift', 'test-apps/cocoa/Makefile') }}

      - name: Run unit tests
        run: cargo test --workspace

      - name: Grant accessibility TCC permission
        run: |
          # GitHub Actions macOS runners allow sudo writes to the system TCC
          # database (SIP only covers /System/*). We use named columns so the
          # INSERT works across macOS versions regardless of how many extra
          # columns (e.g. boots_count, is_deleted on macOS 14+) the table has.
          PYTHON_PATH=$(python3 -c "import sys; print(sys.executable)")
          echo "Granting TCC kTCCServiceAccessibility to: $PYTHON_PATH"
          sudo sqlite3 "/Library/Application Support/com.apple.TCC/TCC.db" \
            "INSERT OR REPLACE INTO access(service,client,client_type,auth_value,auth_reason,auth_version,csreq,policy_id,indirect_object_identifier_type,indirect_object_identifier,indirect_object_code_identity,flags,last_modified) \
             VALUES('kTCCServiceAccessibility','${PYTHON_PATH}',1,2,4,1,NULL,NULL,0,'UNUSED',NULL,0,$(date +%s));"
          # Restart tccd so the new grant is picked up without waiting for the
          # next natural reload cycle. launchctl stop triggers an auto-restart.
          sudo launchctl stop com.apple.tccd 2>/dev/null || true
          sleep 2

      - name: Run Cocoa integration tests
        run: ./scripts/run_cocoa_tests.sh

      # Qt integration tests skipped: macOS AX tree for Qt apps has
      # incomplete structure (nested AXApplication nodes). The depth
      # limit prevents hangs but widgets aren't fully exposed.
      # Re-enable after fixing macOS provider tree building for Qt.

  # ── Windows: unit tests + Qt tests ─────────────────────────────────
  windows:
    name: Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run unit tests
        run: cargo test --workspace

      # Rust integration tests require an interactive desktop for UIA.
      # Run locally with: .\run_integ_tests_windows.ps1

      - name: Create virtualenv and install deps
        shell: bash
        run: |
          python -m venv .venv-qt-test
          .venv-qt-test/Scripts/pip.exe install maturin
          .venv-qt-test/Scripts/pip.exe install -r tests/requirements.txt
          .venv-qt-test/Scripts/pip.exe install -r test-apps/qt/requirements.txt

      - name: Build & install xa11y Python bindings
        shell: bash
        working-directory: xa11y-python
        run: ../.venv-qt-test/Scripts/pip.exe install -e .

      - name: Run Qt integration tests
        shell: bash
        env:
          QT_ACCESSIBILITY: "1"
        run: .venv-qt-test/Scripts/pytest.exe tests/qt/ -v -s --timeout=15 --rootdir=.

  # ── Lint & format ──────────────────────────────────────────────────
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry & build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-lint-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-lint-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Check JS bindings formatting
        working-directory: xa11y-js
        run: cargo fmt -- --check

      - name: Check READMEs are in sync
        run: cargo xtask sync-readmes --check

      - name: Run clippy
        run: cargo clippy --workspace --all-targets

      - name: Run clippy on JS bindings
        working-directory: xa11y-js
        run: cargo clippy --all-targets

  # ── License check ─────────────────────────────────────────────────
  license-check:
    name: License Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Cache cargo-deny binary
        id: cache-cargo-deny
        uses: actions/cache@v5
        with:
          path: ~/.cargo/bin/cargo-deny
          key: cargo-deny-${{ runner.os }}-${{ runner.arch }}

      - name: Install cargo-deny
        if: steps.cache-cargo-deny.outputs.cache-hit != 'true'
        run: cargo install cargo-deny --locked

      - name: Check licenses
        run: cargo deny check licenses

  # ── Cross-compilation ──────────────────────────────────────────────
  cross-compile:
    name: Cross-compile check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin,x86_64-unknown-linux-gnu,aarch64-unknown-linux-gnu

      - name: Cache cargo registry & build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-cross-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-cross-

      - name: Check xa11y-core compiles for all targets
        run: |
          for target in x86_64-apple-darwin aarch64-apple-darwin x86_64-unknown-linux-gnu aarch64-unknown-linux-gnu; do
            echo "=== Checking $target ==="
            cargo check -p xa11y-core --target $target
          done

  # ── Python bindings ───────────────────────────────────────────────
  python:
    name: Python bindings
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-python-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-python-

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Create virtualenv and install tools
        run: |
          python -m venv .venv
          .venv/bin/pip install maturin ruff pytest

      - name: Ruff lint
        working-directory: xa11y-python
        run: ../.venv/bin/ruff check python/ tests/

      - name: Ruff format
        working-directory: xa11y-python
        run: ../.venv/bin/ruff format --check python/ tests/

      - name: Build & install
        working-directory: xa11y-python
        run: ../.venv/bin/maturin develop --release

      - name: Run tests
        working-directory: xa11y-python
        run: ../.venv/bin/pytest tests/ -v

  # ── Docs build ──────────────────────────────────────────────────
  docs:
    name: Docs build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            xa11y-js/target
          key: ${{ runner.os }}-cargo-docs-${{ hashFiles('xa11y-js/Cargo.lock', '**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-docs-

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            docs/site/package-lock.json
            xa11y-js/package-lock.json

      # The JS API doc generator reads xa11y-js/native.d.ts, which is
      # produced by napi-rs from the Rust source. Build + patch it here
      # so the generator has a fresh source of truth to read from.
      - name: Install xa11y-js dev deps
        working-directory: xa11y-js
        run: npm ci

      - name: Build xa11y-js native binding (for type stubs)
        working-directory: xa11y-js
        run: npx napi build --platform --js native.js --dts native.d.ts

      - name: Patch native.d.ts
        working-directory: xa11y-js
        run: node scripts/patch-native-dts.mjs

      - name: Generate Python API docs
        run: python docs/generate_python_api.py

      - name: Generate JavaScript API docs
        run: python docs/generate_js_api.py

      - name: Install Starlight npm dependencies
        working-directory: docs/site
        run: npm ci

      - name: Build Starlight site
        working-directory: docs/site
        run: npm run build

  # ── JavaScript bindings ───────────────────────────────────────────
  js:
    name: JS bindings (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            xa11y-js/target
          key: ${{ runner.os }}-cargo-js-${{ hashFiles('xa11y-js/Cargo.lock', '**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-js-

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: xa11y-js/package-lock.json

      - name: Install JS dev dependencies
        working-directory: xa11y-js
        run: npm ci

      - name: Cargo check (warnings as errors)
        working-directory: xa11y-js
        env:
          RUSTFLAGS: -Dwarnings
        run: cargo check

      - name: Cargo fmt --check
        working-directory: xa11y-js
        run: cargo fmt -- --check

      - name: Build native binding (debug)
        working-directory: xa11y-js
        run: npx napi build --platform --js native.js --dts native.d.ts

      - name: Patch native.d.ts
        working-directory: xa11y-js
        run: node scripts/patch-native-dts.mjs

      - name: Type-check (tsc --noEmit)
        working-directory: xa11y-js
        run: npx tsc --noEmit

      - name: Run unit tests
        working-directory: xa11y-js
        run: npm test

  # ── JS integration tests on Linux against the AccessKit test app ──
  js-integ:
    name: JS integration (Linux)
    runs-on: ubuntu-latest
    needs: js
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
            xa11y-js/target
          key: ${{ runner.os }}-cargo-js-integ-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-js-integ-

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: xa11y-js/package-lock.json

      - name: Install system dependencies
        # Same list as the Linux unit-test job: xvfb + dbus + at-spi2 for
        # accessibility, xcb/xkb/egl for winit's window backend.
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            xvfb dbus dbus-x11 \
            at-spi2-core \
            libxkbcommon-x11-0 libxkbcommon-x11-dev \
            libxcursor1 libxrandr2 libxi6 \
            libx11-xcb1 libxcb-render0 libxcb-shape0 libxcb-xfixes0 \
            libegl1 libglib2.0-0 libfontconfig1 libdbus-1-3 \
            libxcb-cursor0 libxcb-icccm4 libxcb-keysyms1 \
            libxcb-image0 libxcb-render-util0 libxcb-xkb1

      - name: Run JS integration tests
        run: ./scripts/run_js_tests.sh

  # ── Fuzz testing ───────────────────────────────────────────────────
  fuzz:
    name: Fuzz (10s per target)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz

      - name: Cache cargo registry & build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            xa11y-fuzz/fuzz/target
          key: ${{ runner.os }}-cargo-fuzz-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-fuzz-

      - name: Run fuzz targets
        run: |
          cd xa11y-fuzz/fuzz
          for target in tree_ops selector query serde; do
            echo "=== Fuzzing $target for 10s ==="
            cargo +nightly fuzz run $target -- -max_total_time=10 || true
          done
