name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

jobs:
  # ── Linux: unit tests + integration tests ──────────────────────────
  linux:
    name: Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            xvfb \
            dbus \
            libxkbcommon-x11-0 \
            libxkbcommon-x11-dev \
            libxcursor1 \
            libxrandr2 \
            libxi6 \
            libx11-xcb1 \
            libxcb-render0 \
            libxcb-shape0 \
            libxcb-xfixes0
          sudo apt-get install -y at-spi2-core || sudo apt-get install -y at-spi2-common
          sudo apt-get install -y dbus-x11 || true

      - name: Run unit tests
        run: cargo test --workspace

      - name: Run integration tests
        run: ./scripts/run_integ_tests.sh

  # ── macOS: unit tests ──────────────────────────────────────────────
  macos:
    name: macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Run unit tests
        run: cargo test --workspace

      # Integration tests require accessibility permissions (TCC),
      # which GitHub Actions runners don't grant. Run locally with:
      #   ./run_integ_tests_macos.sh

  # ── Windows: unit tests ────────────────────────────────────────────
  windows:
    name: Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Run unit tests
        run: cargo test --workspace

      # Integration tests require an interactive desktop session for UIA.
      # GitHub Actions runners don't provide one. Run locally or on EC2 with:
      #   .\run_integ_tests_windows.ps1

  # ── Lint & format ──────────────────────────────────────────────────
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry & build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-lint-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-lint-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --workspace --all-targets

  # ── License check ─────────────────────────────────────────────────
  license-check:
    name: License Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Cache cargo-deny binary
        id: cache-cargo-deny
        uses: actions/cache@v5
        with:
          path: ~/.cargo/bin/cargo-deny
          key: cargo-deny-${{ runner.os }}-${{ runner.arch }}

      - name: Install cargo-deny
        if: steps.cache-cargo-deny.outputs.cache-hit != 'true'
        run: cargo install cargo-deny --locked

      - name: Check licenses
        run: cargo deny check licenses

  # ── Cross-compilation ──────────────────────────────────────────────
  # Verifies xa11y-core compiles for targets we can't run tests on
  # (e.g., cross-compiling the platform-agnostic core from Linux to
  # macOS/ARM). Catches conditional compilation issues early.
  cross-compile:
    name: Cross-compile check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin,x86_64-unknown-linux-gnu,aarch64-unknown-linux-gnu

      - name: Cache cargo registry & build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-cross-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-cross-

      - name: Check xa11y-core compiles for all targets
        run: |
          for target in x86_64-apple-darwin aarch64-apple-darwin x86_64-unknown-linux-gnu aarch64-unknown-linux-gnu; do
            echo "=== Checking $target ==="
            cargo check -p xa11y-core --target $target
          done

  # ── Python bindings ───────────────────────────────────────────────
  python:
    name: Python bindings
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-python-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-python-

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Create virtualenv and install tools
        run: |
          python -m venv .venv
          .venv/bin/pip install maturin ruff pytest

      - name: Ruff lint
        working-directory: xa11y-python
        run: ../.venv/bin/ruff check python/ tests/

      - name: Ruff format
        working-directory: xa11y-python
        run: ../.venv/bin/ruff format --check python/ tests/

      - name: Generate READMEs
        run: cargo xtask sync-readmes

      - name: Build & install
        working-directory: xa11y-python
        run: ../.venv/bin/maturin develop --release

      - name: Run tests
        working-directory: xa11y-python
        run: ../.venv/bin/pytest tests/ -v

  # ── Docs build ──────────────────────────────────────────────────
  docs:
    name: Docs build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: docs/site/package-lock.json

      - name: Generate Python API docs
        run: python docs/generate_python_api.py

      - name: Install npm dependencies
        working-directory: docs/site
        run: npm ci

      - name: Build Starlight site
        working-directory: docs/site
        run: npm run build

  # ── Qt integration tests (PySide6) ─────────────────────────────────
  # Launches a real PySide6 app and tests it with the xa11y Python library
  # on every platform.
  qt-integ-linux:
    name: Qt Integration (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-qt-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-qt-

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            xvfb dbus dbus-x11 \
            at-spi2-core \
            libxkbcommon-x11-0 libxkbcommon-x11-dev \
            libxcursor1 libxrandr2 libxi6 \
            libx11-xcb1 libxcb-render0 libxcb-shape0 libxcb-xfixes0 \
            libegl1 libglib2.0-0 libfontconfig1 libdbus-1-3 \
            libxcb-cursor0 libxcb-icccm4 libxcb-keysyms1 \
            libxcb-image0 libxcb-render-util0 libxcb-xkb1

      - name: Run Qt integration tests
        run: ./scripts/run_qt_tests.sh

  # Qt Integration (macOS) — skipped: macOS provider hits infinite recursion
  # on Qt/PySide6 apps (application node has itself as child). Tracked as a
  # separate bug. Re-enable once the macOS provider handles this.

  qt-integ-windows:
    name: Qt Integration (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-qt-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-qt-

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Create virtualenv and install deps
        shell: bash
        run: |
          python -m venv .venv-qt-test
          .venv-qt-test/Scripts/pip.exe install maturin pytest pytest-timeout
          .venv-qt-test/Scripts/pip.exe install -r xa11y-qt-test-app/requirements.txt

      - name: Generate READMEs
        run: cargo xtask sync-readmes

      - name: Build & install xa11y
        shell: bash
        working-directory: xa11y-python
        run: ../.venv-qt-test/Scripts/pip.exe install -e .

      - name: Run Qt integration tests
        shell: bash
        env:
          QT_ACCESSIBILITY: "1"
        run: .venv-qt-test/Scripts/pytest.exe xa11y-qt-test-app/tests/ -v -s --timeout=60

  # ── Fuzz testing ───────────────────────────────────────────────────
  fuzz:
    name: Fuzz (10s per target)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz

      - name: Cache cargo registry & build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            xa11y-fuzz/fuzz/target
          key: ${{ runner.os }}-cargo-fuzz-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-fuzz-

      - name: Run fuzz targets
        run: |
          cd xa11y-fuzz/fuzz
          for target in tree_ops selector query serde; do
            echo "=== Fuzzing $target for 10s ==="
            cargo +nightly fuzz run $target -- -max_total_time=10 || true
          done
