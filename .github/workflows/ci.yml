name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

jobs:
  # ── Linux: unit tests + AccessKit Rust integ tests ────────────────
  linux:
    name: Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install system dependencies
        # `awalsh128/cache-apt-pkgs-action` caches the .debs so re-runs on
        # the same package-set finish in ~10s instead of the ~60s it takes
        # to `apt-get update` + `install` 30 packages from scratch.
        # Bump `version` to invalidate the cache when the package list changes.
        uses: awalsh128/cache-apt-pkgs-action@v1
        with:
          version: 1
          packages: >-
            xvfb dbus dbus-x11 fluxbox
            at-spi2-core
            libxkbcommon-x11-0 libxkbcommon-x11-dev
            libxcursor1 libxrandr2 libxi6
            libx11-xcb1 libxcb-render0 libxcb-shape0 libxcb-xfixes0
            libegl1 libglib2.0-0 libfontconfig1 libdbus-1-3
            libxcb-cursor0 libxcb-icccm4 libxcb-keysyms1
            libxcb-image0 libxcb-render-util0 libxcb-xkb1
            libgtk-4-dev gir1.2-gtk-4.0 libgirepository-2.0-dev libcairo2-dev
            libwebkit2gtk-4.1-dev libssl-dev librsvg2-dev libgtk-3-dev

      - name: Run unit tests
        run: cargo test --workspace

      - name: Run integration tests
        run: ./scripts/run_integ_tests.sh

  # ── Linux Wayland libei: end-to-end input simulation through the
  #    GNOME RemoteDesktop portal. Heavier than the rest of the linux
  #    job (boots mutter + xdg-desktop-portal-gnome inside a container)
  #    so it lives separately. Soft-fail until the headless-consent
  #    pre-grant path stabilises across portal versions; flip
  #    continue-on-error off once it's been green for a few weeks.
  linux-wayland-libei:
    name: Linux Wayland (libei)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - name: Build xa11y-base image
        run: docker build -t xa11y-base -f Containerfile.base .

      - name: Build xa11y-wayland-libei image
        run: docker build -t xa11y-wayland-libei -f Containerfile.wayland-libei .

      - name: Run libei portal e2e tests
        run: |
          docker run --rm \
            -v "$(pwd):/xa11y" \
            xa11y-wayland-libei \
            bash /xa11y/scripts/run_wayland_libei.sh

  # ── macOS: unit tests ──────────────────────────────────────────────
  macos:
    name: macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run unit tests
        run: cargo test --workspace

      # macOS Rust integration tests (including the AX-call-count regression
      # tests in `xa11y-macos/src/ax.rs`) are intentionally NOT wired into CI.
      # They require kTCCServiceAccessibility to be granted to the Rust test
      # harness binary, whose path is cargo-hashed (e.g.
      # `target/debug/deps/integ_test-abc123`). Granting TCC to moving paths
      # has proven fragile under macos-latest runners (hash changes across
      # builds; tccd reloads race with the tests). Developers run them
      # locally via `./scripts/run_integ_tests_macos.sh` where their terminal
      # already has TCC. The ax_calls_* tests are #[ignore]d so they are
      # skipped by `cargo test --workspace`.

      # Qt integration tests skipped: macOS AX tree for Qt apps has
      # incomplete structure (nested AXApplication nodes). The depth
      # limit prevents hangs but widgets aren't fully exposed.
      # Re-enable after fixing macOS provider tree building for Qt.

  # ── Windows: unit tests + AccessKit Rust integ tests ───────────────
  windows:
    name: Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run unit tests
        run: cargo test --workspace

      # Rust integration tests, including the UIA event subscriptions.
      # Hosted windows-latest runners DO have an interactive desktop session
      # (the same runner that executes the Qt UIA tests below), so UIA works
      # fine here. The harness script launches the AccessKit test app in the
      # background, waits for it to register with UIA, runs the `#[ignore]`
      # integration tests with --test-threads=1, and tears the app down.
      - name: Run Rust integration tests
        shell: pwsh
        run: .\scripts\run_integ_tests_windows.ps1

  # ── Compatibility integ matrix: one app × one OS × all language suites ──
  #
  # Each matrix cell starts the test app once, then runs the Python, JS, and
  # CLI suites against it via tests/harness/launch.py. This replaces the old
  # per-language per-app per-OS jobs (run_qt_tests.sh, run_gtk_tests.sh,
  # run_tauri_tests.sh, run_cocoa_tests.sh, run_electron_tests.sh,
  # js-integ, js-integ-macos, js-integ-windows, electron).
  integ:
    name: Integ (${{ matrix.app }}) on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,  app: accesskit }
          - { os: macos-latest,   app: accesskit }
          - { os: windows-latest, app: accesskit }
          - { os: ubuntu-latest,  app: qt }
          - { os: ubuntu-latest,  app: gtk }
          - { os: ubuntu-latest,  app: tauri }
          - { os: ubuntu-latest,  app: electron }
          - { os: macos-latest,   app: cocoa }
          - { os: macos-latest,   app: tauri }
          - { os: windows-latest, app: qt }
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-integ-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-integ-

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: xa11y-js/package-lock.json

      # ── System dependencies (Linux only) ──────────────────────────
      - name: Install system dependencies
        # `awalsh128/cache-apt-pkgs-action` caches the .debs so re-runs on
        # the same package-set finish in ~10s. Bump `version` to invalidate
        # when the package list changes. Electron adds nss/atk/cups/drm/gbm
        # on top of the base X/dbus/a11y set.
        if: runner.os == 'Linux'
        uses: awalsh128/cache-apt-pkgs-action@v1
        with:
          version: 1
          packages: >-
            xvfb dbus dbus-x11 fluxbox
            at-spi2-core
            libxkbcommon-x11-0 libxkbcommon-x11-dev
            libxcursor1 libxrandr2 libxi6
            libx11-xcb1 libxcb-render0 libxcb-shape0 libxcb-xfixes0
            libegl1 libglib2.0-0 libfontconfig1 libdbus-1-3
            libxcb-cursor0 libxcb-icccm4 libxcb-keysyms1
            libxcb-image0 libxcb-render-util0 libxcb-xkb1
            libgtk-4-dev gir1.2-gtk-4.0 libgirepository-2.0-dev libcairo2-dev
            libwebkit2gtk-4.1-dev libssl-dev librsvg2-dev libgtk-3-dev
            libnss3 libatk1.0-0 libatk-bridge2.0-0 libcups2
            libdrm2 libgbm1 libxcomposite1 libxdamage1 libxfixes3
            libpango-1.0-0 libasound2t64

      # ── Build Rust workspace (all workspace test-app binaries) ─────
      - name: Build Rust workspace
        run: cargo build --workspace

      # ── Tauri app (not in workspace — has its own Cargo.lock) ──────
      - name: Cache Tauri test app build
        if: matrix.app == 'tauri'
        uses: actions/cache@v5
        with:
          path: test-apps/tauri/target
          key: ${{ runner.os }}-tauri-app-${{ hashFiles('test-apps/tauri/Cargo.lock', 'test-apps/tauri/Cargo.toml', 'test-apps/tauri/build.rs', 'test-apps/tauri/tauri.conf.json', 'test-apps/tauri/src/**', 'test-apps/tauri/frontend/**') }}
          restore-keys: |
            ${{ runner.os }}-tauri-app-

      - name: Build Tauri test app
        if: matrix.app == 'tauri'
        run: cargo build --manifest-path test-apps/tauri/Cargo.toml

      # ── Electron node_modules ──────────────────────────────────────
      - name: Cache Electron node_modules
        if: matrix.app == 'electron'
        uses: actions/cache@v5
        with:
          path: test-apps/electron/node_modules
          key: ${{ runner.os }}-electron-app-${{ hashFiles('test-apps/electron/package.json') }}
          restore-keys: |
            ${{ runner.os }}-electron-app-

      - name: Install Electron node_modules
        if: matrix.app == 'electron'
        working-directory: test-apps/electron
        run: npm install

      # ── Build xa11y-python in a venv ──────────────────────────────
      - name: Create virtualenv and install Python tools
        if: runner.os != 'Windows'
        run: |
          python -m venv .venv-integ
          .venv-integ/bin/pip install maturin
          .venv-integ/bin/pip install -r tests/requirements.txt

      - name: Create virtualenv and install Python tools (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          python -m venv .venv-integ
          .venv-integ/Scripts/pip.exe install maturin
          .venv-integ/Scripts/pip.exe install -r tests/requirements.txt

      - name: Build & install xa11y Python bindings
        if: runner.os != 'Windows'
        working-directory: xa11y-python
        run: ../.venv-integ/bin/pip install -e .

      - name: Build & install xa11y Python bindings (Windows)
        if: runner.os == 'Windows'
        working-directory: xa11y-python
        shell: bash
        run: ../.venv-integ/Scripts/pip.exe install -e .

      # ── Build xa11y-js ─────────────────────────────────────────────
      - name: Cache xa11y-js node_modules and native target
        uses: actions/cache@v5
        with:
          path: |
            xa11y-js/node_modules
            xa11y-js/target
          key: ${{ runner.os }}-xa11y-js-${{ hashFiles('xa11y-js/package-lock.json', 'xa11y-js/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-xa11y-js-

      - name: Install xa11y-js dependencies and build
        working-directory: xa11y-js
        run: npm install && npm run build:debug

      # ── App-specific Python requirements ──────────────────────────
      - name: Install Qt Python requirements
        if: matrix.app == 'qt' && runner.os != 'Windows'
        run: .venv-integ/bin/pip install -r test-apps/qt/requirements.txt

      - name: Install Qt Python requirements (Windows)
        if: matrix.app == 'qt' && runner.os == 'Windows'
        shell: bash
        run: .venv-integ/Scripts/pip.exe install -r test-apps/qt/requirements.txt

      - name: Install GTK Python requirements
        if: matrix.app == 'gtk'
        run: .venv-integ/bin/pip install -r test-apps/gtk/requirements.txt

      # ── Grant TCC on macOS ─────────────────────────────────────────
      - name: Grant accessibility TCC permission
        if: runner.os == 'macOS'
        run: |
          # GitHub Actions macOS runners allow sudo writes to the system TCC
          # database (SIP only covers /System/*). We use named columns so the
          # INSERT works across macOS versions regardless of how many extra
          # columns (e.g. boots_count, is_deleted on macOS 14+) the table has.
          PYTHON_PATH=$(.venv-integ/bin/python -c "import sys; print(sys.executable)")
          echo "Granting TCC kTCCServiceAccessibility to: $PYTHON_PATH"
          sudo sqlite3 "/Library/Application Support/com.apple.TCC/TCC.db" \
            "INSERT OR REPLACE INTO access(service,client,client_type,auth_value,auth_reason,auth_version,csreq,policy_id,indirect_object_identifier_type,indirect_object_identifier,indirect_object_code_identity,flags,last_modified) \
             VALUES('kTCCServiceAccessibility','${PYTHON_PATH}',1,2,4,1,NULL,NULL,0,'UNUSED',NULL,0,$(date +%s));"
          # Restart tccd so the new grant is picked up without waiting for the
          # next natural reload cycle. launchctl stop triggers an auto-restart.
          sudo launchctl stop com.apple.tccd 2>/dev/null || true
          sleep 2

      # ── Cache Cocoa test app binary ────────────────────────────────
      - name: Cache Cocoa test app binary
        if: matrix.app == 'cocoa'
        uses: actions/cache@v5
        with:
          path: test-apps/cocoa/xa11y-cocoa-test-app
          key: ${{ runner.os }}-cocoa-app-${{ hashFiles('test-apps/cocoa/main.swift', 'test-apps/cocoa/Makefile') }}

      # ── Run harness (Linux: wrapped in Xvfb + dbus-run-session) ───
      - name: Run integration harness (Linux)
        if: runner.os == 'Linux'
        run: |
          export DISPLAY=:99
          Xvfb :99 -screen 0 1280x1024x24 -ac &
          dbus-run-session -- .venv-integ/bin/python tests/harness/launch.py ${{ matrix.app }} python js cli

      - name: Run integration harness (macOS)
        if: runner.os == 'macOS'
        run: .venv-integ/bin/python tests/harness/launch.py ${{ matrix.app }} python js cli

      - name: Run integration harness (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: .venv-integ/Scripts/python.exe tests/harness/launch.py ${{ matrix.app }} python js cli

  # ── Lint & format ──────────────────────────────────────────────────
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry & build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-lint-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-lint-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Check JS bindings formatting
        working-directory: xa11y-js
        run: cargo fmt -- --check

      - name: Check READMEs are in sync
        run: cargo xtask sync-readmes --check

      - name: Run clippy
        run: cargo clippy --workspace --all-targets

      - name: Run clippy on JS bindings
        working-directory: xa11y-js
        run: cargo clippy --all-targets

      - name: Check bindings parity
        run: cargo xtask check-bindings-parity

      - name: Check test coverage matrix
        run: python tests/matrix_check.py

  # ── License check ─────────────────────────────────────────────────
  license-check:
    name: License Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Cache cargo-deny binary
        id: cache-cargo-deny
        uses: actions/cache@v5
        with:
          path: ~/.cargo/bin/cargo-deny
          key: cargo-deny-${{ runner.os }}-${{ runner.arch }}

      - name: Install cargo-deny
        if: steps.cache-cargo-deny.outputs.cache-hit != 'true'
        run: cargo install cargo-deny --locked

      - name: Check licenses
        run: cargo deny check licenses

  # ── Cross-compilation ──────────────────────────────────────────────
  cross-compile:
    name: Cross-compile check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin,x86_64-unknown-linux-gnu,aarch64-unknown-linux-gnu

      - name: Cache cargo registry & build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-cross-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-cross-

      - name: Check xa11y-core compiles for all targets
        run: |
          for target in x86_64-apple-darwin aarch64-apple-darwin x86_64-unknown-linux-gnu aarch64-unknown-linux-gnu; do
            echo "=== Checking $target ==="
            cargo check -p xa11y-core --target $target
          done

  # ── Python bindings ───────────────────────────────────────────────
  python:
    name: Python bindings
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-python-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-python-

      # xa11y-linux now links libxkbcommon for the Wayland input backend.
      # The Python wheel embeds xa11y, so it pulls the .so dependency in
      # transitively at link time on Linux.
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libxkbcommon-dev

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Create virtualenv and install tools
        run: |
          python -m venv .venv
          .venv/bin/pip install maturin ruff pytest

      - name: Ruff lint
        working-directory: xa11y-python
        run: ../.venv/bin/ruff check python/ tests/

      - name: Ruff format
        working-directory: xa11y-python
        run: ../.venv/bin/ruff format --check python/ tests/

      - name: Build & install
        working-directory: xa11y-python
        run: ../.venv/bin/maturin develop --release

      - name: Run tests
        working-directory: xa11y-python
        run: ../.venv/bin/pytest tests/ -v

  # ── Docs build ──────────────────────────────────────────────────
  docs:
    name: Docs build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            xa11y-js/target
          key: ${{ runner.os }}-cargo-docs-${{ hashFiles('xa11y-js/Cargo.lock', '**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-docs-

      # napi build links xa11y-js → xa11y → xa11y-linux on the Linux
      # docs runner; xa11y-linux now needs libxkbcommon at link time.
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libxkbcommon-dev

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            docs/site/package-lock.json
            xa11y-js/package-lock.json

      # The JS API doc generator reads xa11y-js/native.d.ts, which is
      # produced by napi-rs from the Rust source. Build + patch it here
      # so the generator has a fresh source of truth to read from.
      - name: Install xa11y-js dev deps
        working-directory: xa11y-js
        run: npm ci

      - name: Build xa11y-js native binding (for type stubs)
        working-directory: xa11y-js
        run: npx napi build --platform --js native.js --dts native.d.ts

      - name: Patch native.d.ts
        working-directory: xa11y-js
        run: node scripts/patch-native-dts.mjs

      - name: Generate Python API docs
        run: python docs/generate_python_api.py

      - name: Generate JavaScript API docs
        run: python docs/generate_js_api.py

      - name: Install Starlight npm dependencies
        working-directory: docs/site
        run: npm ci

      - name: Build Starlight site
        working-directory: docs/site
        run: npm run build

  # ── JavaScript bindings ───────────────────────────────────────────
  js:
    name: JS bindings (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            xa11y-js/target
          key: ${{ runner.os }}-cargo-js-${{ hashFiles('xa11y-js/Cargo.lock', '**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-js-

      # xa11y-js → xa11y → xa11y-linux requires libxkbcommon to link on
      # Linux. macOS / Windows skip this — those runners don't pull
      # xa11y-linux in.
      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libxkbcommon-dev

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: xa11y-js/package-lock.json

      - name: Install JS dev dependencies
        working-directory: xa11y-js
        run: npm ci

      - name: Cargo check (warnings as errors)
        working-directory: xa11y-js
        env:
          RUSTFLAGS: -Dwarnings
        run: cargo check

      - name: Cargo fmt --check
        working-directory: xa11y-js
        run: cargo fmt -- --check

      - name: Build native binding (debug)
        working-directory: xa11y-js
        run: npx napi build --platform --js native.js --dts native.d.ts

      - name: Patch native.d.ts
        working-directory: xa11y-js
        run: node scripts/patch-native-dts.mjs

      - name: Type-check (tsc --noEmit)
        working-directory: xa11y-js
        run: npx tsc --noEmit

      - name: Run unit tests
        working-directory: xa11y-js
        run: npm test

  # ── Fuzz testing ───────────────────────────────────────────────────
  fuzz:
    name: Fuzz (10s per target)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz

      - name: Cache cargo registry & build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            xa11y-fuzz/fuzz/target
          key: ${{ runner.os }}-cargo-fuzz-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-fuzz-

      - name: Run fuzz targets
        run: |
          cd xa11y-fuzz/fuzz
          for target in tree_ops selector query serde; do
            echo "=== Fuzzing $target for 10s ==="
